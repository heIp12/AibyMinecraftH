<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>괴담 TRPG 로그 뷰어</title>
<style>
  :root{
    --bg:#14161c; --panel:#1c1f27; --panel2:#232733; --line:#2e3340;
    --txt:#e7e9ee; --dim:#9aa1b1; --accent:#7aa2ff;
    --input:#9ad27a; --gm:#cdbbff; --npc:#ffd27a; --ability:#ff8a8a;
    --system:#6f7686; --broadcast:#7adfff;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  header{padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:5}
  header h1{font-size:15px;margin:0;font-weight:600}
  header .meta{color:var(--dim);font-size:12px;max-width:44vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .layout{display:flex;height:calc(100vh - 53px)}
  aside{width:250px;min-width:250px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:8px}
  aside h2{font-size:11px;text-transform:uppercase;color:var(--dim);letter-spacing:.05em;margin:12px 6px 6px}
  .vp{padding:7px 10px;border-radius:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;gap:6px}
  .vp:hover{background:var(--panel2)}
  .vp.active{background:var(--accent);color:#0d1018;font-weight:600}
  .vp .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vp .cnt{font-size:11px;color:var(--dim);flex:none}
  .vp.active .cnt{color:#0d1018}
  .filelist .fl{padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filelist .fl:hover{background:var(--panel2);color:var(--txt)}
  .filelist .fl.on{background:var(--panel2);color:var(--accent)}
  main{flex:1;overflow-y:auto;padding:14px 18px}
  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .toolbar input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 10px;border-radius:7px;min-width:200px}
  .toolbar label{color:var(--dim);display:flex;gap:5px;align-items:center;cursor:pointer;user-select:none}
  .toolbar button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 11px;border-radius:7px;cursor:pointer}
  .toolbar button.on{background:var(--accent);color:#0d1018;border-color:var(--accent);font-weight:600}
  .ev{border:1px solid var(--line);border-left-width:4px;border-radius:10px;background:var(--panel);padding:9px 13px;margin-bottom:8px;max-width:900px;animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .ev .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;margin-bottom:3px}
  .ev .t{color:var(--dim);font-variant-numeric:tabular-nums;font-size:12px;flex:none}
  .ev .badge{font-size:11px;padding:1px 7px;border-radius:20px;background:var(--panel2);color:var(--dim)}
  .ev .who{font-weight:600}
  .ev .arrow{color:var(--dim)}
  .ev .body{white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;line-height:1.55;color:#dfe2ea}
  .ev.me{border-left-color:var(--input);background:#1b2418}
  .ev.me .top .who{color:var(--input)}
  .ev.k-input{border-left-color:var(--input)}
  .ev.k-gm{border-left-color:var(--gm)}
  .ev.k-npc{border-left-color:var(--npc)}
  .ev.k-ability{border-left-color:var(--ability);background:#251c22}
  .ev.k-system{border-left-color:var(--system);opacity:.85}
  .ev.k-broadcast{border-left-color:var(--broadcast)}
  .ev.k-gm_input{border-left-color:#444b5a;opacity:.72}
  .ev.k-ability .badge{background:var(--ability);color:#2a0f0f}
  .pill{font-size:11px;padding:1px 7px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}
  .drop{margin:50px auto;max-width:600px;border:2px dashed var(--line);border-radius:14px;padding:44px 24px;text-align:center;color:var(--dim);background:var(--panel)}
  .drop.drag{border-color:var(--accent);color:var(--txt);background:var(--panel2)}
  .drop b{color:var(--txt)} code{background:var(--panel2);padding:1px 5px;border-radius:4px;color:#bcd0ff}
  .empty{color:var(--dim);text-align:center;padding:30px}
  button.file{background:var(--accent);color:#0d1018;border:0;padding:7px 13px;border-radius:7px;font-weight:600;cursor:pointer}
  button.file.alt{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  /* 스탯/시나리오 패널 */
  #info{position:fixed;right:0;top:53px;bottom:0;width:340px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:12px 14px;transform:translateX(100%);transition:transform .2s;z-index:6}
  #info.open{transform:none}
  #info h3{font-size:13px;margin:14px 0 6px;color:var(--accent)}
  #info .card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:7px;font-size:12px;line-height:1.5}
  #info .st{display:inline-block;min-width:58px;color:var(--dim)}
  #info .tr{color:#ffd27a}
  .infoClose{float:right;cursor:pointer;color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1>🩸 괴담 TRPG 로그 뷰어</h1>
  <span class="meta" id="meta">로그를 불러오세요</span>
  <span style="flex:1"></span>
  <button class="file" id="pick">파일 열기</button>
  <button class="file alt" id="pickDir">📁 폴더 열기</button>
  <button class="file alt" id="toggleInfo" style="display:none">📊 스탯·시나리오</button>
  <input type="file" id="file" accept=".jsonl,.json,.txt,.replay" multiple style="display:none">
  <input type="file" id="dir" webkitdirectory directory multiple style="display:none">
</header>
<div class="layout">
  <aside id="side"><div class="empty" style="padding:20px 8px">시점 목록</div></aside>
  <main id="main">
    <div class="drop" id="drop">
      <p>📂 <b>로그 파일을 여기에 끌어다 놓으세요</b></p>
      <p>권장: <code>씨드#n.events.jsonl</code> (시점별 정밀) · 또는 <code>씨드#n.txt</code><br>
         함께: <code>.replay</code>(스탯·특성) · <code>.json</code>(시나리오) 를 같이 넣으면 부가 표시</p>
      <p><b>📁 폴더 열기</b> — 플러그인 <code>logs</code> 폴더를 통째로 선택하면 목록에서 고를 수 있어요</p>
    </div>
  </main>
</div>
<div id="info"><span class="infoClose" onclick="document.getElementById('info').classList.remove('open')">✕ 닫기</span><div id="infoBody"></div></div>
<script>
"use strict";
let EVENTS=[], VIEWPOINTS=[], curVP="__all__";
let ALIAS={};            // 계정명/캐릭터명 → 표준 표시명
let REPLAY=null, SCENARIO=null;
let FILES={logs:[],replays:[],scenarios:[]};
let play={on:false,n:0,timer:null};

const GLOBAL_RE=/전체|전원|모두|모든|방송|broadcast|^\*$|all/i;
// 시점에서 떼어낼 국면 접미사 — "world_44(프롤로그)" → "world_44"
const PHASE_SUFFIX=/\s*\((프롤로그|전환|목격|대기|뒷이야기|에필로그|배드엔딩|시간\s*경과|프롤로그)\)\s*$/;
const HIDE_KIND_DEFAULT=new Set(["gm_input","alias"]);

function isGlobal(s){return GLOBAL_RE.test(s||"")}
function stripPhase(s){return (s||"").replace(PHASE_SUFFIX,"").trim()}
function canon(name){
  let n=stripPhase(name);
  if(!n) return n;
  if(ALIAS[n]) return ALIAS[n];
  return n;
}
function isPerson(s){
  if(!s) return false;
  if(["GM","SYSTEM","시스템"].includes(s)) return false;
  if(isGlobal(s)) return false;
  return true;
}

// 원시 이벤트(JSONL/txt) → 표준화. NPC 통화·방송·계정↔캐릭터 정규화 처리.
function normalize(ev){
  let kind=ev.kind||"", actor=ev.actor||"", to=Array.isArray(ev.to)?ev.to.slice():[];
  const cat=ev.cat||"", who=ev.who||"", text=ev.text||"";
  let target="";
  if(!kind || !actor){
    if(cat==="입력"){ kind=kind||"input"; actor=actor||who; }
    else if(cat==="GM입력"){ kind=kind||"gm_input"; actor=actor||who; }
    else if(cat.startsWith("GM→")){
      let x=cat.slice(3);
      if(isGlobal(x)){ kind=kind||"broadcast"; actor=actor||"GM"; }
      else if(x.startsWith("능력방송")){ kind=kind||"broadcast"; actor=actor||"GM"; }
      else if(x.startsWith("NPC")){                 // GM→NPC(이름)→대상 / GM→NPC직접(이름)
        kind=kind||"npc";
        const m=x.match(/\(([^)]*)\)/); if(m) actor=actor||m[1];
        const ar=x.indexOf("→"); if(ar>=0) target=x.slice(ar+1);
      } else { kind=kind||"gm"; actor=actor||"GM"; target=x; }   // GM→플레이어
    }
    else if(cat.startsWith("NPC")){                  // NPC(이름) / NPC(이름)→대상 / NPC직접(이름)
      kind=kind||"npc";
      const m=cat.match(/\(([^)]*)\)/); if(m) actor=actor||m[1];
      const ar=cat.indexOf("→"); if(ar>=0) target=cat.slice(ar+1);
    }
    else if(cat.startsWith("능력")){ kind=kind||"ability"; actor=actor||who; }
    else if(cat==="배역"){ kind=kind||"alias"; }
    else if(["세션","구분","이벤트"].includes(cat)){ kind=kind||"system"; }
    else { kind=kind||"event"; actor=actor||who; }
  }
  if(target && !to.length) to=[target];
  actor=canon(actor);
  to=to.map(canon);
  return {seq:ev.seq||0,t:ev.t||"",kind,actor,to,ability:ev.ability||"",detail:ev.detail||"",text,cat};
}

function visibleTo(e,vp){
  if(vp==="__all__") return true;
  if(e.kind==="system") return true;
  if(e.kind==="broadcast") return true;
  if(e.actor===vp) return true;
  if(e.to.includes(vp)) return true;
  if(e.to.some(isGlobal)) return true;
  return false;
}
function buildViewpoints(){
  const m=new Map();
  for(const e of EVENTS){ if(e.kind==="alias")continue; for(const c of [e.actor,...e.to]){ if(isPerson(c)) m.set(c,(m.get(c)||0)+1); } }
  VIEWPOINTS=[...m.entries()].map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
}

function renderSide(){
  const side=document.getElementById("side"); side.innerHTML="";
  const mk=(name,label,count)=>{const d=document.createElement("div");d.className="vp"+(curVP===name?" active":"");
    d.innerHTML=`<span class="nm">${label}</span><span class="cnt">${count}</span>`;
    d.onclick=()=>{curVP=name;stopPlay();renderSide();renderMain();};return d;};
  side.appendChild(Object.assign(document.createElement("h2"),{textContent:"전체"}));
  side.appendChild(mk("__all__","🗂 전체 타임라인",EVENTS.length));
  side.appendChild(Object.assign(document.createElement("h2"),{textContent:"시점 (플레이어·NPC)"}));
  if(!VIEWPOINTS.length){const e=document.createElement("div");e.className="empty";e.style.padding="10px";e.textContent="(.jsonl 권장 · .replay 넣으면 이름 통합)";side.appendChild(e);}
  for(const v of VIEWPOINTS) side.appendChild(mk(v.name,"👤 "+v.name,v.count));
  if(FILES.logs.length){
    side.appendChild(Object.assign(document.createElement("h2"),{textContent:"폴더 로그"}));
    const wrap=document.createElement("div"); wrap.className="filelist";
    for(const f of FILES.logs){const d=document.createElement("div");d.className="fl"+(f.__on?" on":"");d.textContent="📄 "+f.name;
      d.onclick=()=>openFolderLog(f);wrap.appendChild(d);}
    side.appendChild(wrap);
  }
}

function badgeFor(e){
  if(e.kind==="ability") return e.ability?("✨ "+e.ability):"✨ 능력";
  if(e.kind==="input") return "입력";
  if(e.kind==="gm") return "GM 서술";
  if(e.kind==="broadcast") return "📢 방송";
  if(e.kind==="npc") return "☎ NPC";
  if(e.kind==="system") return "시스템";
  if(e.kind==="gm_input") return "GM입력(상세)";
  return e.cat||"이벤트";
}

function filtered(){
  const q=(document.getElementById("q")?.value||"").trim().toLowerCase();
  const onlyAbil=document.getElementById("onlyAbil")?.checked;
  const showVerbose=document.getElementById("verbose")?.checked;
  return EVENTS.filter(e=>{
    if(!visibleTo(e,curVP)) return false;
    if(onlyAbil && e.kind!=="ability") return false;
    if(!showVerbose && HIDE_KIND_DEFAULT.has(e.kind)) return false;
    if(q){const hay=(e.actor+" "+e.to.join(" ")+" "+e.ability+" "+e.text+" "+e.cat).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
}

function renderMain(){
  const main=document.getElementById("main");
  const q=(document.getElementById("q")?.value||"");
  const onlyAbil=document.getElementById("onlyAbil")?.checked;
  const showVerbose=document.getElementById("verbose")?.checked;
  let list=filtered();
  const shown=play.on?list.slice(0,play.n):list;
  let html=`<div class="toolbar">
    <input type="text" id="q" placeholder="🔎 내용·이름 검색" value="${escAttr(q)}">
    <label><input type="checkbox" id="onlyAbil" ${onlyAbil?"checked":""}> ✨ 능력만</label>
    <label><input type="checkbox" id="verbose" ${showVerbose?"checked":""}> GM입력 상세</label>
    <button id="playBtn" class="${play.on?"on":""}">${play.on?"⏸ 멈춤":"▶ 채팅재생"}</button>
    <span class="pill">${play.on?shown.length+"/"+list.length:list.length+"건"}</span>
    <span class="pill">시점: ${curVP==="__all__"?"전체":curVP}</span>
  </div><div id="stream">`;
  if(!list.length) html+=`<div class="empty">표시할 이벤트가 없습니다.</div>`;
  for(const e of shown) html+=evHtml(e);
  html+=`</div>`;
  main.innerHTML=html;
  const q2=document.getElementById("q"); if(q2){q2.oninput=()=>{stopPlay();renderMain();};q2.focus();q2.setSelectionRange(q2.value.length,q2.value.length);}
  const a=document.getElementById("onlyAbil"); if(a)a.onchange=()=>{stopPlay();renderMain();};
  const v=document.getElementById("verbose"); if(v)v.onchange=()=>{stopPlay();renderMain();};
  const pb=document.getElementById("playBtn"); if(pb)pb.onclick=togglePlay;
  if(play.on){const st=document.getElementById("stream");if(st)st.lastElementChild&&st.lastElementChild.scrollIntoView({block:"end"});}
}
function evHtml(e){
  const me=(curVP!=="__all__" && e.actor===curVP && (e.kind==="input"||e.kind==="ability"))?" me":"";
  const who=e.actor?`<span class="who">${esc(e.actor)}</span>`:"";
  const toStr=e.to.filter(isPerson).length?`<span class="arrow">→ ${esc(e.to.filter(isPerson).join(", "))}</span>`:"";
  const det=e.detail&&e.kind==="ability"?`<span class="badge">${esc(e.detail)}</span>`:"";
  return `<div class="ev k-${e.kind}${me}"><div class="top"><span class="t">${esc(e.t)}</span>
    <span class="badge">${esc(badgeFor(e))}</span>${det}${who}${toStr}</div>
    ${e.text?`<div class="body">${esc(e.text)}</div>`:""}</div>`;
}

// 채팅 재생(한 블록씩)
function togglePlay(){ if(play.on) stopPlay(); else startPlay(); }
function startPlay(){ play.on=true; play.n=0; renderMain(); play.timer=setInterval(()=>{
  const total=filtered().length; play.n++; if(play.n>=total){play.n=total;renderMain();stopPlay();return;} renderMain();
},650); }
function stopPlay(){ if(play.timer)clearInterval(play.timer); play.timer=null; if(play.on){play.on=false;} }

function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function escAttr(s){return esc(s).replace(/"/g,"&quot;")}

// ── 파싱 ──
function parseJSONL(t){const out=[];for(const ln of t.split(/\r?\n/)){const s=ln.trim();if(!s)continue;try{out.push(JSON.parse(s));}catch(_){} }return out;}
function parseTXT(t){const out=[];let cur=null,seq=0;const head=/^\[(\d\d:\d\d:\d\d)\]\s*\[([^\]]+)\]\s?(.*)$/;
  for(const raw of t.split(/\r?\n/)){const m=raw.match(head);
    if(m){if(cur)out.push(cur);cur={seq:++seq,t:m[1],cat:m[2],who:"",text:m[3]||""};}
    else if(cur&&raw.trim()){cur.text+=(cur.text?"\n":"")+raw.trim();}}
  if(cur)out.push(cur);return out;}

function buildAlias(){
  ALIAS={};
  // 1) 로그 자체의 배역 별칭(계정↔캐릭터) — .events.jsonl(kind=alias) 또는 .txt([배역] 계정 = 캐릭터)
  for(const ev of RAWCACHE){
    if(ev.kind==="alias" && ev.account && ev.char){ ALIAS[ev.account]=ev.char; ALIAS[ev.char]=ev.char; }
    else if(ev.cat==="배역" && ev.who){ const m=(ev.text||"").match(/=\s*(.+)$/); if(m){ const c=m[1].trim(); ALIAS[ev.who]=c; ALIAS[c]=c; } }
  }
  // 2) .replay 를 함께 불러온 경우(있으면 우선 보강)
  if(REPLAY&&Array.isArray(REPLAY.players)){
    for(const p of REPLAY.players){
      const disp=(p.charName&&p.charName.trim())?p.charName.trim():(p.name||"");
      if(p.name) ALIAS[p.name]=disp;
      if(p.charName) ALIAS[p.charName]=disp;
    }
  }
}
function rebuild(raw){
  EVENTS=raw.map(normalize).sort((a,b)=>(a.seq||0)-(b.seq||0));
  buildViewpoints(); curVP="__all__"; stopPlay();
}

function loadLogText(name,text){
  const looksJson=/\.jsonl?$/i.test(name)||/^\s*\{/.test(text);
  let raw=looksJson?parseJSONL(text):parseTXT(text);
  if(!raw.length&&looksJson) raw=parseTXT(text);
  RAWCACHE=raw;
  buildAlias(); rebuild(raw);
  const sess=EVENTS.find(e=>e.kind==="system"&&/시작/.test(e.text));
  document.getElementById("meta").textContent=`${name} · ${EVENTS.length}개 이벤트 · 시점 ${VIEWPOINTS.length}`+(REPLAY?" · .replay 연결됨":"")+(sess?` · ${sess.text}`:"");
  renderSide(); renderMain();
}
let RAWCACHE=[];

// ── 스탯/시나리오 패널 ──
function renderInfo(){
  const b=document.getElementById("infoBody"); let h="";
  if(REPLAY){
    h+=`<h3>플레이어 (${REPLAY.stage!=null?"스테이지 "+REPLAY.stage:""})</h3>`;
    for(const p of (REPLAY.players||[])){
      const hp=Array.isArray(p.hp)?p.hp.join("/"):p.hp, san=Array.isArray(p.san)?p.san.join("/"):p.san;
      h+=`<div class="card"><b>${esc(p.charName||p.name||"?")}</b> <span style="color:var(--dim)">${esc(p.job||"")} · ${p.age??"?"}세 · ${esc(p.zone||"")}</span><br>
        <span class="st">체력</span>${esc(hp)} <span class="st">정신</span>${esc(san)}<br>
        <span class="st">근력</span>${p.str??"?"} <span class="st">매력</span>${p.cha??"?"} <span class="st">행운</span>${p.luk??"?"} <span class="st">영감</span>${p.spr??"?"}`;
      if(Array.isArray(p.traits)&&p.traits.length){h+=`<br>`+p.traits.map(t=>`<span class="tr">✦ ${esc(t.name)}${t.grade?"("+esc(t.grade)+")":""}</span>`).join(" ");}
      h+=`</div>`;
    }
  }
  if(SCENARIO){
    const e=SCENARIO.entity||{};
    h+=`<h3>시나리오</h3><div class="card"><b>${esc(e.name||"?")}</b> <span style="color:var(--dim)">${esc(SCENARIO.scale||"")}</span>`;
    if(SCENARIO.world_rules&&SCENARIO.world_rules.core) h+=`<br><span class="st">규칙</span>${esc(SCENARIO.world_rules.core)}`;
    if(e.weakness) h+=`<br><span class="st">약점</span>${esc(e.weakness)}`;
    h+=`</div>`;
    if(Array.isArray(SCENARIO.npcs)&&SCENARIO.npcs.length){
      h+=`<h3>NPC</h3>`; for(const n of SCENARIO.npcs){h+=`<div class="card"><b>${esc(n.name||n.id||"?")}</b> <span style="color:var(--dim)">${esc(n.role_type||"")}${n.zone?" · "+esc(n.zone):""}</span>${n.motivation?"<br>"+esc(n.motivation):""}</div>`;}
    }
  }
  if(!h) h=`<div class="empty">.replay(스탯) 또는 .json(시나리오)을 함께 불러오면 여기 표시됩니다.</div>`;
  b.innerHTML=h;
  document.getElementById("toggleInfo").style.display=(REPLAY||SCENARIO)?"":"none";
}

// ── 파일 수용 ──
function ingest(file){
  const nm=file.name.toLowerCase();
  return file.text().then(t=>{
    if(nm.endsWith(".replay")){ try{REPLAY=JSON.parse(t);}catch(_){}
      if(RAWCACHE.length){buildAlias();rebuild(RAWCACHE);renderSide();} renderInfo(); return "replay"; }
    if(nm.endsWith(".json")){ try{const j=JSON.parse(t); if(j.entity||j.world_rules||j.npcs) SCENARIO=j; else if(j.players) REPLAY=j;}catch(_){}
      if(REPLAY&&RAWCACHE.length){buildAlias();rebuild(RAWCACHE);renderSide();} renderInfo(); return "json"; }
    // 로그(.jsonl/.txt)
    loadLogText(file.name,t); renderInfo(); return "log";
  });
}
function ingestAll(fileList){
  const files=[...fileList];
  // 우선순위: replay/json 먼저 반영 후 로그 → 이름 통합이 즉시 적용되게
  const meta=files.filter(f=>/\.(replay|json)$/i.test(f.name));
  const logs=files.filter(f=>/\.(jsonl|txt)$/i.test(f.name));
  Promise.all(meta.map(ingest)).then(()=>{ (logs[0]?ingest(logs[0]):Promise.resolve()); });
}

// 폴더 선택 → 목록 구성
function ingestFolder(fileList){
  FILES={logs:[],replays:[],scenarios:[]};
  for(const f of fileList){
    if(/\.(jsonl|txt)$/i.test(f.name)) FILES.logs.push(f);
    else if(/\.replay$/i.test(f.name)) FILES.replays.push(f);
    else if(/\.json$/i.test(f.name)) FILES.scenarios.push(f);
  }
  FILES.logs.sort((a,b)=>a.name.localeCompare(b.name));
  if(FILES.logs.length) openFolderLog(FILES.logs.find(f=>/\.events\.jsonl$/i.test(f.name))||FILES.logs[0]);
  else { document.getElementById("meta").textContent="폴더에 .jsonl/.txt 로그가 없습니다."; }
}
function seedOf(name){ const m=name.match(/([A-Za-z0-9]{6,8})[#_.]/); return m?m[1]:name.replace(/\.[^.]+$/,""); }
function openFolderLog(f){
  FILES.logs.forEach(x=>x.__on=false); f.__on=true;
  const seed=seedOf(f.name);
  // 같은 씨드의 replay/scenario 자동 매칭
  REPLAY=null; SCENARIO=null;
  const rep=FILES.replays.find(x=>x.name.includes(seed)); const sc=FILES.scenarios.find(x=>x.name.includes(seed));
  const jobs=[];
  if(rep) jobs.push(rep.text().then(t=>{try{REPLAY=JSON.parse(t);}catch(_){}}));
  if(sc)  jobs.push(sc.text().then(t=>{try{const j=JSON.parse(t);if(j.entity||j.world_rules||j.npcs)SCENARIO=j;else if(j.players&&!REPLAY)REPLAY=j;}catch(_){}}));
  Promise.all(jobs).then(()=> f.text()).then(t=>{ loadLogText(f.name,t); renderInfo(); });
}

// ── 바인딩 ──
const fileEl=document.getElementById("file"), dirEl=document.getElementById("dir");
document.getElementById("pick").onclick=()=>fileEl.click();
document.getElementById("pickDir").onclick=()=>dirEl.click();
document.getElementById("toggleInfo").onclick=()=>{renderInfo();document.getElementById("info").classList.toggle("open");};
fileEl.onchange=e=>{ if(e.target.files.length) ingestAll(e.target.files); };
dirEl.onchange=e=>{ if(e.target.files.length) ingestFolder(e.target.files); };
const drop=document.getElementById("drop");
["dragenter","dragover"].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
["dragleave","drop"].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();if(ev==="dragleave"&&e.relatedTarget)return;drop.classList.remove("drag");}));
document.addEventListener("drop",e=>{ const fs=e.dataTransfer?.files; if(fs&&fs.length) ingestAll(fs); });
</script>
</body>

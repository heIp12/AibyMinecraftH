<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>괴담 TRPG 로그 뷰어</title>
<style>
  :root{ --bg:#14161c; --panel:#1c1f27; --panel2:#232733; --line:#2e3340;
    --txt:#e7e9ee; --dim:#9aa1b1; --accent:#7aa2ff;
    --input:#9ad27a; --gm:#cdbbff; --npc:#ffd27a; --ability:#ff8a8a; --system:#6f7686; --broadcast:#7adfff; --vital:#ff6b8a; }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  header{padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:5}
  header h1{font-size:15px;margin:0;font-weight:600}
  header .meta{color:var(--dim);font-size:12px;max-width:40vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .layout{display:flex;height:calc(100vh - 53px)}
  aside{width:250px;min-width:250px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:8px}
  aside h2{font-size:11px;text-transform:uppercase;color:var(--dim);letter-spacing:.05em;margin:12px 6px 6px}
  .vp{padding:7px 10px;border-radius:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;gap:6px}
  .vp:hover{background:var(--panel2)} .vp.active{background:var(--accent);color:#0d1018;font-weight:600}
  .vp .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .vp .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .vp .cnt{font-size:11px;color:var(--dim);flex:none} .vp.active .cnt{color:#0d1018}
  .filelist .fl{padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filelist .fl:hover{background:var(--panel2);color:var(--txt)} .filelist .fl.on{background:var(--panel2);color:var(--accent)}
  main{flex:1;overflow-y:auto;padding:14px 18px}
  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;position:sticky;top:0;background:var(--bg);padding:4px 0;z-index:3}
  .toolbar input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 10px;border-radius:7px;min-width:180px}
  .toolbar label{color:var(--dim);display:flex;gap:5px;align-items:center;cursor:pointer;user-select:none}
  .toolbar button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 11px;border-radius:7px;cursor:pointer}
  .toolbar button.on{background:var(--accent);color:#0d1018;border-color:var(--accent);font-weight:600}
  .toolbar input[type=range]{vertical-align:middle;width:110px}
  .ev{border:1px solid var(--line);border-left-width:4px;border-radius:10px;background:var(--panel);padding:9px 13px;margin-bottom:8px;max-width:920px;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .ev .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;margin-bottom:3px}
  .ev .t{color:var(--dim);font-variant-numeric:tabular-nums;font-size:12px;flex:none}
  .ev .badge{font-size:11px;padding:1px 7px;border-radius:20px;background:var(--panel2);color:var(--dim)}
  .ev .who{font-weight:600} .ev .arrow{color:var(--dim)}
  .ev.split{margin-left:18px;border-left:2px solid var(--line)} .ev .top.cont{opacity:.55}
  .ln{white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;line-height:1.6;color:#dfe2ea;margin:2px 0;animation:pop .16s ease}
  .ln.bc{color:var(--broadcast);font-weight:600} .ln.mono{color:#c9b3ff;font-style:italic}
  .ln.say b{font-weight:700}
  .sp{height:7px}
  .ev.me{border-left-color:var(--input);background:#1b2418} .ev.me .top .who{color:var(--input)}
  .ev.k-input{border-left-color:var(--input)} .ev.k-gm{border-left-color:var(--gm)} .ev.k-npc{border-left-color:var(--npc)}
  .ev.k-ability{border-left-color:var(--ability);background:#251c22} .ev.k-system{border-left-color:var(--system);opacity:.85}
  .ev.k-broadcast{border-left-color:var(--broadcast)} .ev.k-gm_input{border-left-color:#444b5a;opacity:.72}
  .ev.k-private{border-left-color:#8f9bb0}
  .ev.k-vital{border-left-color:var(--vital);background:#2a1820}
  .ev.k-ability .badge{background:var(--ability);color:#2a0f0f}
  .ev.k-vital .badge{background:var(--vital);color:#2a0f14}
  .ev.k-item{border-left-color:#e0c56a;background:#241f14} .ev.k-item .badge{background:#e0c56a;color:#2a230f}
  .ev.k-clue{border-left-color:#66c8b0;background:#14231f} .ev.k-clue .badge{background:#66c8b0;color:#0f2a23}
  .ev.k-shout,.ev.k-letter,.ev.k-whisper{border-left-color:var(--broadcast)}
  .ln.tamper-orig{color:var(--dim);text-decoration:line-through;opacity:.72}
  .ln.tamper-new{color:#ff9a6b;font-weight:600}
  .tamper-tag{font-size:11px;color:var(--dim);margin-right:5px}
  #info .know{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:7px;font-size:12px;line-height:1.55}
  #info .know .hp{color:var(--vital)} #info .know .san{color:#7aa2ff}
  #info .know .kitem{color:#e0c56a} #info .know .kclue{color:#66c8b0}
  #info .know .khead{font-weight:600;margin-bottom:3px} #info .live{color:#ff9a6b;font-size:11px}
  .pill{font-size:11px;padding:1px 7px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}
  .drop{margin:50px auto;max-width:600px;border:2px dashed var(--line);border-radius:14px;padding:44px 24px;text-align:center;color:var(--dim);background:var(--panel)}
  .drop.drag{border-color:var(--accent);color:var(--txt);background:var(--panel2)}
  .drop b{color:var(--txt)} code{background:var(--panel2);padding:1px 5px;border-radius:4px;color:#bcd0ff}
  .empty{color:var(--dim);text-align:center;padding:30px}
  button.file{background:var(--accent);color:#0d1018;border:0;padding:7px 13px;border-radius:7px;font-weight:600;cursor:pointer}
  button.file.alt{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  #info{position:fixed;right:0;top:53px;bottom:0;width:340px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:12px 14px;transform:translateX(100%);transition:transform .2s;z-index:6}
  #info.open{transform:none}
  #info h3{font-size:13px;margin:14px 0 6px;color:var(--accent)}
  #info .card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:7px;font-size:12px;line-height:1.5}
  #info .st{display:inline-block;min-width:58px;color:var(--dim)} #info .tr{color:#ffd27a}
  #info .sub{color:var(--dim);font-size:11px;margin:5px 0 2px;text-transform:uppercase;letter-spacing:.04em}
  #info .dim2{color:var(--dim);font-size:11px}
  #info .trait{border-top:1px solid var(--line);padding:4px 0 3px}
  #info .trait:first-of-type{border-top:0}
  #info .grd{color:#ffd27a;font-weight:600}
  #info .act{font-size:10px;color:var(--accent);border:1px solid var(--line);border-radius:10px;padding:0 5px}
  #info .tdesc{margin:2px 0;color:var(--txt)}
  #info .teff{color:var(--dim);font-size:11px}
  #info .tboost{color:#8fe0a0;font-size:11px}
  #info .spoiler{border:1px dashed #7a4a4a;border-radius:8px;padding:0 8px 6px;margin:6px 0;background:rgba(150,70,70,.08)}
  #info .spoiler h3{color:#ff9a8f}
  #info h3.sech{cursor:pointer;user-select:none} #info h3.sech:hover{filter:brightness(1.15)}
  #info h3.sech .secarrow{color:var(--dim);font-size:11px;margin-right:2px}
  .infoClose{float:right;cursor:pointer;color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1>🩸 괴담 TRPG 로그 뷰어</h1>
  <span class="meta" id="meta">로그를 불러오세요</span>
  <span style="flex:1"></span>
  <button class="file" id="pickAuto">🔍 자동 탐색·결합</button>
  <button class="file alt" id="pick">파일 열기</button>
  <button class="file alt" id="pickDir">📁 폴더 열기</button>
  <button class="file alt" id="toggleInfo" style="display:none">📊 스탯·시나리오</button>
  <input type="file" id="file" accept=".jsonl,.json,.txt,.replay,.gdam" multiple style="display:none">
  <input type="file" id="dir" webkitdirectory directory multiple style="display:none">
</header>
<div class="layout">
  <aside id="side"><div class="empty" style="padding:20px 8px">시점 목록</div></aside>
  <main id="main">
    <div class="drop" id="drop">
      <p>📂 <b>로그 파일을 여기에 끌어다 놓으세요</b></p>
      <p>권장: <code>씨드#n.events.jsonl</code> · 또는 <code>씨드#n.txt</code> · 함께 <code>.replay</code>/<code>.json</code>/<code>.gdam</code></p>
      <p><b>🔍 자동 탐색·결합</b> — <code>logs</code>·<code>replays</code>·<code>gdam</code>을 품은 <b>상위 폴더</b>를 한 번 선택하면 하위를 훑어 이름·스탯·시나리오까지 자동 결합</p>
      <p><b>📁 폴더 열기</b> — 폴더가 따로면 <code>logs</code>→<code>replays</code>→<code>gdam</code>을 차례로 열어도 자동 누적·결합</p>
    </div>
  </main>
</div>
<div id="info"><span class="infoClose" onclick="document.getElementById('info').classList.remove('open')">✕ 닫기</span><div id="infoBody"></div></div>
<script>
"use strict";
let EVENTS=[], VIEWPOINTS=[], curVP="__all__";
let ALIAS={}, REPLAY=null, SCENARIO=null, RAWCACHE=[], KNOWN=new Set(), CONTACTS={};
let FILES={logs:[],replays:[],scenarios:[],gdams:[]};
let playing=false, speed=1, queue=[], qi=0, qtimer=null, curBodyEl=null;
let COLLAPSED=new Set(); // 정보 패널에서 접어둔 섹션 id — 재렌더(실시간 갱신 포함)에도 상태 유지

const GLOBAL_RE=/전체|전원|모두|모든|방송|broadcast|^\*$|all/i;
const PHASE_SUFFIX=/\s*\((프롤로그|전환|목격|대기|뒷이야기|에필로그|배드엔딩|시간\s*경과)\)\s*$/;
const HIDE_KIND_DEFAULT=new Set(["gm_input","alias"]);
const BC_TAG=/^(안내방송|방송|전체방송|전체\s*공지|공지|전체\s*경고|PA)$/;
const DENY_TAG=/(판정|결과|시스템|안내방송|정보|기록|목격|근처|전체|경고|주의|대기|프롤로그|전환|방송)/;

function isGlobal(s){return GLOBAL_RE.test(s||"")}
function stripPhase(s){return (s||"").replace(PHASE_SUFFIX,"").trim()}
function canon(n){let x=stripPhase(n);return x&&ALIAS[x]?ALIAS[x]:x;}
function isPerson(s){return s&&!["GM","SYSTEM","시스템"].includes(s)&&!isGlobal(s);}
function colorFor(name){ if(!name)return "#cdbbff"; let h=0; for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0; return `hsl(${h%360},62%,72%)`; }

function normalize(ev){
  let kind=ev.kind||"", actor=ev.actor||"", to=Array.isArray(ev.to)?ev.to.slice():[];
  const cat=ev.cat||"", who=ev.who||"", text=ev.text||""; let target="", bodyText=text; let viaName=ev.via||"";
  if(!kind||!actor){
    if(cat==="입력"){kind=kind||"input";if(!actor)actor=who;
      // 구형 txt '[입력] <계정> <내용>' — 첫 토큰=발화자(계정명은 본문에서 제거해 메타 노출 차단)
      if(!actor){const mm=text.match(/^(\S+)(?:\s+([\s\S]*))?$/);if(mm){actor=mm[1];bodyText=mm[2]||"";}}
      // @전체/@근처/@<대상> → 통신(방송/근처/통화)으로 분류(통화내역 필터·가시성에 반영)
      const mc=bodyText.match(/^@(\S+)\s*([\s\S]*)$/);
      if(mc){const tg=mc[1];
        if(/^(전체|전원|모두|all)$/i.test(tg))kind="broadcast";
        else if(/^(근처|주변|주위)$/.test(tg))kind="nearby";
        else if(CONTACTS[tg]){kind="call";target=CONTACTS[tg];bodyText="@"+CONTACTS[tg]+(mc[2]?" "+mc[2]:"");} // 연락처 번호 → 이름으로 표시
        else if(!/^(GM|시스템|SYSTEM)$/i.test(tg) && (KNOWN.has(tg)||KNOWN.has(canon(tg)))){kind="call";if(!target)target=tg;}
        // 미지의 @이름(오타·없는 대상)은 통화로 인식하지 않음 → 유령 대상·시점 생성 방지(입력 그대로)
      }}
    else if(cat==="GM입력"){kind=kind||"gm_input";actor=actor||who;}
    else if(cat.startsWith("GM→")){let x=cat.slice(3);
      if(isGlobal(x)||x.startsWith("능력방송")){kind=kind||"broadcast";actor=actor||"GM";}
      else if(x.startsWith("NPC")){kind=kind||"npc";const m=x.match(/\(([^)]*)\)/);if(m)actor=actor||m[1];const a=x.indexOf("→");if(a>=0)target=x.slice(a+1);}
      else{kind=kind||"gm";actor=actor||"GM";target=x;}}
    else if(cat.startsWith("NPC")){kind=kind||"npc";const m=cat.match(/\(([^)]*)\)/);if(m)actor=actor||m[1];const a=cat.indexOf("→");if(a>=0)target=cat.slice(a+1);}
    else if(cat.startsWith("능력")){kind=kind||"ability";actor=actor||who;}
    else if(cat==="통신"){
      // 통신 이벤트 — 본문 앞 [통화]/[근처]/[방송]/[외침]/[편지]/[귓속말](+·구체매체명) 라벨로 ★대화방식(매체)★을 인식.
      //  JSONL은 kind가 이미 있어 라벨은 중복 제거용 / 구형 .txt는 라벨에서 kind·매체명을 유추한다. 예: [편지·전서구]
      const cm=text.match(/^(.*?)\s*\[(통화|근처|방송|외침|편지|귓속말|수신호|정신감응)(?:·([^\]]+))?\]\s*([\s\S]*)$/);
      if(cm){
        if(!actor)actor=who||cm[1].trim(); // JSONL: who=발신자 / txt: 라벨 앞 토큰=발신자
        if(!kind){const l=cm[2];kind=l==="통화"?"call":l==="근처"?"nearby":l==="방송"?"broadcast":l==="외침"?"shout":l==="편지"?"letter":l==="귓속말"?"whisper":l==="수신호"?"signal":l==="정신감응"?"psychic":"call";}
        if(!viaName&&cm[3])viaName=cm[3].trim(); // 구체 매체명(전서구·통신구·서찰·필담…)
        bodyText=cm[4]; // 중복 라벨 제거 — 매체는 뱃지로만 표시
      } else { if(!actor)actor=who; if(!kind)kind="call"; }
    }
    else if(cat==="아이템"){kind=kind||"item";actor=actor||who;}
    else if(cat==="단서"){kind=kind||"clue";actor=actor||who;}
    else if(cat==="배역"){kind=kind||"alias";}
    else if(cat==="개인"){
      if(/배역 배정 →/.test(text)){kind="assign";if(!actor)actor=who;} // 신형 배역배정(당사자 개인 로그) — 시점 한정
      else{kind=kind||"private";if(!actor)actor=who||((text.match(/^(\S+)/)||[])[1]||"");}}
    else if(["세션","구분","이벤트"].includes(cat)){
      const a1=text.match(/배역 배정:\s*(\S+)\s*→/); // 구형 배역배정(전역 이벤트) → 당사자 시점으로 한정(assign)
      const a2=text.match(/배역 등장:\s*(\S+)\s*\[/); // "배역 등장: 계정 [role_id]" — 계정명·role_id 메타 노출 스크럽
      if(a1){kind="assign";if(!actor)actor=a1[1];}
      else if(a2){kind="assign";if(!actor)actor=a2[1];}
      else kind=kind||"system";}
    else{kind=kind||"event";actor=actor||who;}
  }
  if(target&&!to.length)to=[target];
  actor=canon(actor); to=to.map(canon);
  if(kind==="assign")bodyText=(/등장/.test(text)?"배역 등장: ":"배역 배정: ")+(actor||"?"); // 계정→role_id·zone_id 메타 제거 + 표시명으로
  return {seq:ev.seq||0,t:ev.t||"",kind,actor,to,ability:ev.ability||"",detail:ev.detail||"",phase:ev.phase||"",cause:ev.cause||"",
          text:bodyText,cat,orig:ev.orig||"",via:viaName,item:ev.item||"",
          hpAfter:ev.hpAfter,hpMax:ev.hpMax,sanAfter:ev.sanAfter,sanMax:ev.sanMax,hpDelta:ev.hpDelta,sanDelta:ev.sanDelta};
}
function visibleTo(e,vp){ if(vp==="__all__")return true; if(e.kind==="system"||e.kind==="broadcast"||e.kind==="nearby")return true;
  if(e.actor===vp)return true; if(e.to.includes(vp))return true; if(e.to.some(isGlobal))return true; return false; }
function buildViewpoints(){ const m=new Map();
  for(const e of EVENTS){ if(e.kind==="alias")continue; for(const c of [e.actor,...e.to])if(isPerson(c))m.set(c,(m.get(c)||0)+1); }
  // 플레이어 판별: replay 표시명 + input(입력) 이벤트 발화자(=플레이어만 입력함). 나머지는 NPC·괴담.
  const players=new Set();
  const uni=(nm,jb)=>{nm=(nm||"").trim();jb=(jb||"").trim();return (nm&&jb)?nm+"("+jb+")":(nm||jb);};
  if(REPLAY&&Array.isArray(REPLAY.players))for(const p of REPLAY.players){if(p.charName){players.add(canon(p.charName));players.add(uni(p.charName,p.job));}}
  for(const e of EVENTS){ if(e.kind==="input"&&isPerson(e.actor))players.add(e.actor); }
  VIEWPOINTS=[...m.entries()].map(([name,count])=>({name,count,isPlayer:players.has(name)})).sort((a,b)=>b.count-a.count); }

// ── 본문 파싱: 방송/독백/대사/서술 + 문단(빈 줄) 분리 ──
function parseBody(text){
  const out=[];
  for(const raw of (text||"").split(/\n/)){
    const line=raw.trim();
    if(!line){ out.push({type:"br"}); continue; }
    let m;
    if(m=line.match(/^\[([^\]]{1,16})\]\s*(.*)$/)){
      const tag=m[1].trim();
      if(BC_TAG.test(tag)){ out.push({type:"bc",text:m[2]||line}); continue; }
      if(!DENY_TAG.test(tag) && /^[가-힣A-Za-z0-9_ ]{2,12}$/.test(tag) && m[2]){ out.push({type:"say",name:tag,text:m[2]}); continue; }
      out.push({type:"narr",text:line}); continue;
    }
    if(m=line.match(/^<-\s*([\s\S]*?)\s*->$/)){ out.push({type:"mono",text:m[1]}); continue; }
    out.push({type:"narr",text:line});
  }
  return out;
}
function blockHtml(b){
  if(b.type==="br") return `<div class="sp"></div>`;
  if(b.type==="bc") return `<div class="ln bc">📢 ${esc(b.text)}</div>`;
  if(b.type==="mono") return `<div class="ln mono">「${esc(b.text)}」</div>`;
  if(b.type==="say") return `<div class="ln say"><b style="color:${colorFor(b.name)}">${esc(b.name)}</b> ${esc(b.text)}</div>`;
  return `<div class="ln">${esc(b.text)}</div>`;
}
function headHtml(e){
  const me=(curVP!=="__all__"&&e.actor===curVP&&(e.kind==="input"||e.kind==="ability"))?" me":"";
  const col=isPerson(e.actor)?colorFor(e.actor):"";

  const toStr=e.to.filter(isPerson).length?`<span class="arrow">→ ${esc(e.to.filter(isPerson).join(", "))}</span>`:"";
  const det=e.detail&&e.kind==="ability"?`<span class="badge">${esc(e.detail)}</span>`:"";
  return {cls:"ev k-"+e.kind+me, top:`<div class="top"><span class="t">${esc(e.t)}</span><span class="badge">${esc(badgeFor(e))}</span>${det}${who}${toStr}</div>`};

// 본문 HTML — 괴담·NPC가 메시지를 변형(변절)했으면 원본/변형됨을 대조해 보여준다.
function bodyHtmlOf(e){
  if(e.orig) return `<div class="ln"><span class="tamper-tag">원본</span><span class="tamper-orig">${esc(e.orig)}</span></div>`
                  + `<div class="ln"><span class="tamper-tag">변형됨</span><span class="tamper-new">${esc(e.text)}</span></div>`;
  return parseBody(e.text).map(blockHtml).join("");
}
function evHtml(e){ const h=headHtml(e); const body=bodyHtmlOf(e); return `<div class="${h.cls}">${h.top}${body?`<div class="body">${body}</div>`:""}</div>`; }
// 개별(현재) 시점 전용: GM 서술에 낀 대사·방송을 별도 칸으로 분리(전체 타임라인은 evHtml 그대로 유지).
function contHead(e){return `<div class="top cont"><span class="t">${esc(e.t)}</span><span class="badge">${esc(badgeFor(e))}</span></div>`;}
function evHtmlSplit(e){
  if(e.orig) return evHtml(e); // 변형 대조는 통째로
  const blocks=parseBody(e.text);
  if(!blocks.some(b=>b.type==="say"||b.type==="bc")) return evHtml(e); // 분리할 대사·방송 없으면 그대로
  const h=headHtml(e); const out=[]; let buf=[]; let headUsed=false;
  const flush=()=>{const body=buf.map(blockHtml).join(""); buf=[]; if(!body.replace(/<[^>]+>/g,"").trim())return;
    out.push(`<div class="${h.cls}">${headUsed?contHead(e):h.top}<div class="body">${body}</div></div>`); headUsed=true;};
  for(const b of blocks){
    if(b.type==="say"){ flush(); // ★대사: 화자 이름을 상단(헤더)에 — 입력처럼★
      const col=colorFor(b.name);
      out.push(`<div class="ev k-say split"><div class="top"><span class="t">${esc(e.t)}</span><span class="badge">💬 대사</span><span class="who" style="color:${col}">${esc(b.name)}</span></div><div class="body"><div class="ln">${esc(b.text)}</div></div></div>`); headUsed=true;
    } else if(b.type==="bc"){ flush();
      out.push(`<div class="ev k-broadcast split"><div class="top"><span class="t">${esc(e.t)}</span><span class="badge">📢 방송</span></div><div class="body">${blockHtml(b)}</div></div>`); headUsed=true;
    } else buf.push(b);
  }
  flush();
  return out.join("")||evHtml(e);
}

// ── 채팅 재생: 깜빡임 없이 증분 append + 길이별 가변 속도 + 개별뷰 문단 분할 ──
function buildQueue(){
  const list=filtered(); const q=[]; const individual=curVP!=="__all__";
  for(const e of list){
    const blocks=e.text?parseBody(e.text):[];
    if(individual && blocks.length){          // 개별 뷰: 실제 게임처럼 문단(줄)씩
      q.push({e,header:true});
      for(const b of blocks) if(b.type!=="br") q.push({e,block:b});
    } else q.push({e,whole:true});            // 전체 뷰: 이벤트 단위
  }
  return q;
}
function playBtnOn(on){const b=document.getElementById("playBtn");if(b){b.textContent=on?"⏸ 멈춤":"▶ 재생";b.classList.toggle("on",on);}}

function startPlay(){

function pausePlay(){ if(qtimer){clearTimeout(qtimer);qtimer=null;} playing=false; playBtnOn(false); } // 위치 유지(이어재생 가능)
function stopPlay(){ pausePlay(); qi=0; queue=[]; curBodyEl=null; }                                    // 완전 초기화(필터·시점 변경 시)
function step(){
  const stream=document.getElementById("stream"); if(!stream){stopPlay();return;}
  if(qi>=queue.length){ pausePlay(); return; } // 끝 — 상태패널은 마지막 시점으로 남긴다(초기화 X)
  const it=queue[qi++]; let len=40;
  if(it.whole){ stream.insertAdjacentHTML("beforeend",evHtml(it.e)); curBodyEl=null; len=(it.e.text||"").length||40; }
  else if(it.header){ const h=headHtml(it.e); const d=document.createElement("div"); d.className=h.cls;
    d.innerHTML=h.top+`<div class="body"></div>`; stream.appendChild(d); curBodyEl=d.querySelector(".body"); len=8; }
  else if(it.block){ if(curBodyEl) curBodyEl.insertAdjacentHTML("beforeend",blockHtml(it.block)); len=(it.block.text||"").length||20; }
  stream.lastElementChild&&stream.lastElementChild.scrollIntoView({block:"end",behavior:"smooth"});
  if(curVP!=="__all__" && it.e) updateLive(it.e.seq||0); // ★재생 위치에 맞춰 그 플레이어가 '지금' 아는 정보·상태만★
  const cnt=document.getElementById("cnt"); if(cnt)cnt.textContent=qi+"/"+queue.length;
  const delay=Math.max(260,(360+len*24)/speed);   // 길수록 더 오래(읽을 시간)
  qtimer=setTimeout(step,delay);
}
// 표시명 "이름(직업)" — buildAlias의 uni와 동일 규칙(상태 계산에서 replay 플레이어 매칭용).
function uniName(nm,jb){nm=(nm||"").trim();jb=(jb||"").trim();return (nm&&jb)?nm+"("+jb+")":(nm||jb);}
// 특정 시점(seq) 기준, 그 플레이어가 '지금까지' 아는 상태를 접어서 계산(체력·정신·능력발동수·단서·아이템).
function stateAt(vp,seq){
  let hp=null,hpMax=null,san=null,sanMax=null,abil=0; const items=[],clues=[];
  const rp=((REPLAY&&REPLAY.players)||[]).find(p=>uniName(p.charName,p.job)===vp||p.charName===vp||canon(p.charName)===vp);
  if(rp){ if(Array.isArray(rp.hp)){hp=rp.hp[0];hpMax=rp.hp[1];} if(Array.isArray(rp.san)){san=rp.san[0];sanMax=rp.san[1];} }
  for(const e of EVENTS){ if((e.seq||0)>seq)break;
    const mine=e.actor===vp, tome=e.to&&e.to.includes(vp);
    if(e.kind==="vital"&&mine){ if(e.hpAfter!=null){hp=e.hpAfter;hpMax=e.hpMax;} if(e.sanAfter!=null){san=e.sanAfter;sanMax=e.sanMax;} }
    else if(e.kind==="ability"&&mine&&e.phase!=="result")abil++;
    else if(e.kind==="item"&&(mine||tome))items.push((e.item||e.text||"아이템").replace(/^→\S+\s*/,""));
    else if(e.kind==="clue"&&(mine||tome))clues.push((e.text||"단서").replace(/^→\S+\s*/,""));
  }
  return {hp,hpMax,san,sanMax,abil,items,clues};
}

function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function escAttr(s){return esc(s).replace(/"/g,"&quot;")}

// ── 파싱 ──
function parseJSONL(t){const out=[];for(const ln of t.split(/\r?\n/)){const s=ln.trim();if(!s)continue;try{out.push(JSON.parse(s));}catch(_){}}return out;}
function parseTXT(t){const out=[];let cur=null,seq=0;const head=/^\[(\d\d:\d\d:\d\d)\]\s*\[([^\]]+)\]\s?(.*)$/;
  for(const raw of t.split(/\r?\n/)){const m=raw.match(head);
    if(m){if(cur)out.push(cur);cur={seq:++seq,t:m[1],cat:m[2],who:"",text:m[3]||""};}
    else if(cur&&raw.trim()){cur.text+=(cur.text?"\n":"")+raw.trim();}}
  if(cur)out.push(cur);return out;}
function buildAlias(){
  ALIAS={}; KNOWN=new Set(); CONTACTS={};
  const uni=(nm,jb)=>{nm=(nm||"").trim();jb=(jb||"").trim();return (nm&&jb)?`${nm}(${jb})`:(nm||jb);}; // 이름(직업)
  // 표시명 disp로 여러 별칭 키(계정·이름·직업·role_id)를 통합 — 같은 사람이 여러 라벨로 쪼개지지 않게.
  const setAll=(disp,...keys)=>{disp=(disp||"").trim();if(!disp||disp==="이름 모를 인물")return;
    for(const k of keys){const kk=(k||"").trim();if(kk){ALIAS[kk]=disp;KNOWN.add(kk);}}KNOWN.add(disp);};
  // replay: role_id → 이름/직업 (구형 이벤트 배역배정에 이름을 붙이는 조인 소스)
  const byRole={};
  if(REPLAY&&Array.isArray(REPLAY.players))for(const p of REPLAY.players)
    if(p.roleId)byRole[p.roleId]={char:(p.charName||"").trim(),job:(p.job||"").trim()};
  for(const ev of RAWCACHE){
    if(ev.kind==="alias"&&ev.account&&ev.char){setAll(ev.char,ev.account,ev.char);}
    else if(ev.cat==="배역"&&ev.who){const m=(ev.text||"").match(/=\s*(.+)$/);if(m)setAll(m[1].trim(),ev.who,m[1].trim());}
    // 신형 개인 '배역 배정 → 이름 (나이세 직업, …)' → 이름(직업)
    else if(ev.cat==="개인"&&ev.who){
      const m=(ev.text||"").match(/배역 배정 →\s*([^(（]+?)\s*[(（]\s*(?:\d+\s*세\s*)?([^,，()）]+?)\s*[,，)）]/);
      if(m)setAll(uni(m[1],m[2]),ev.who,m[1],m[2]);
      else{const m2=(ev.text||"").match(/배역 배정 →\s*([^(（]+?)\s*[(（]/);if(m2)setAll(m2[1].trim(),ev.who,m2[1]);}
    }
    // 구형 이벤트 '배역 배정: 계정 → role_id (나이세 직업, zone …)' → 이름(직업)(이름은 replay 조인, 없으면 직업만)
    const am=(ev.text||"").match(/배역 배정:\s*(\S+)\s*→\s*(\S+)\s*[(（]\s*(?:\d+\s*세\s*)?([^,，()）]+?)\s*[,，)）]/);
    if(am){const acct=am[1],role=am[2],job=am[3].trim();const nm=byRole[role]?byRole[role].char:"";
      setAll(uni(nm,job),acct,role,job,nm);}
  }
  // replay 이름·NPC명도 KNOWN에 등록(@대상 검증용) — 시나리오 NPC 포함
  if(REPLAY&&Array.isArray(REPLAY.players))for(const p of REPLAY.players){const d=uni(p.charName,p.job);if(p.charName)setAll(d,p.charName);
    if(p.contactId){const cid=String(p.contactId).trim();if(cid)CONTACTS[cid]=(p.charName||"").trim()||d;}} // 연락처 번호→이름
  if(SCENARIO&&Array.isArray(SCENARIO.npcs))for(const npc of SCENARIO.npcs){if(npc&&npc.name)KNOWN.add(String(npc.name).trim());
    if(npc&&npc.contactId){const cid=String(npc.contactId).trim();if(cid&&npc.name)CONTACTS[cid]=String(npc.name).trim();}} // NPC 연락처도
  // 이벤트에 등장하는 NPC·GM 대상 이름도 KNOWN에(@대상 오인 방지)
  for(const ev of RAWCACHE){const c=ev.cat||"";let mm;
    if(mm=c.match(/NPC\(([^)]+)\)/))KNOWN.add(mm[1].trim());
    if(c.startsWith("GM→")){const t=stripPhase(c.slice(3)).replace(/^NPC\(/,"").replace(/\)$/,"").trim();if(t&&!isGlobal(t))KNOWN.add(t);}
  }
}
function rebuild(raw){ EVENTS=raw.map(normalize).sort((a,b)=>(a.seq||0)-(b.seq||0)); buildViewpoints(); curVP="__all__"; stopPlay(); }
// 로그에서 괴담(시나리오) 이름 파싱 — 세션 이벤트의 title 필드(JSONL) 또는 '괴담: X' 라인(.txt)
function parseScenarioTitle(text){
  const m=(text||"").match(/"title"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  if(m){try{return JSON.parse('"'+m[1]+'"');}catch(_){return m[1];}}
  const t=(text||"").match(/괴담:\s*([^\n"]+)/);
  return t?t[1].trim():"";
}
// ── .gdam 복호화 (AES-256-GCM · 모든 설치 공유 고정키) ──
// 게임과 동일: key = SHA-256("AiByMinecraft::gdam::shared-scenario-key::v1"),
// 파일 = "seed\n<base64(IV[12]+ciphertext+GCM태그[16])>". 시나리오 공유용 고정키라 뷰어도 그대로 복호화 가능.
const GDAM_KEYSTR="AiByMinecraft::gdam::shared-scenario-key::v1";
let _gdamKey=null;
function gdamKey(){
  if(!_gdamKey){const data=new TextEncoder().encode(GDAM_KEYSTR);
    _gdamKey=crypto.subtle.digest("SHA-256",data).then(h=>crypto.subtle.importKey("raw",h,{name:"AES-GCM"},false,["decrypt"]))
      .catch(e=>{_gdamKey=null;throw e;});} // 실패한 프로미스를 캐시하지 않음(다음 시도 재생성)
  return _gdamKey;
}
function b64ToBytes(b64){const s=atob(String(b64).trim());const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function decryptGdamText(text){
  const t=(text||"").trim(); if(!t)return null;
  if(t.startsWith("{"))return JSON.parse(t); // ② 평문 .gdam(사용자 작성) — 복호화 없이 파싱
  const lines=t.split(/\r?\n/); if(lines.length<2)return null; // ① 암호화 .gdam — 둘째 줄 base64
  if(!(window.crypto&&crypto.subtle))throw new Error("이 브라우저/컨텍스트에서 복호화(SubtleCrypto) 불가");
  const combined=b64ToBytes(lines[1]),iv=combined.slice(0,12),ct=combined.slice(12);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv,tagLength:128},await gdamKey(),ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
function decryptGdamFile(file){return file.text().then(decryptGdamText);}
function gdamTitleOf(j){return (j&&j.entity&&j.entity.name)?String(j.entity.name):"";}
// 폴더 로그 각각의 괴담 이름 확정: 씨드 매칭 .gdam 복호화 우선 → 실패 시 로그 텍스트('괴담: X'/title)에서 파싱
async function resolveFolderTitles(){
  const gd=[];
  for(const g of (FILES.gdams||[])){
    try{const nm=gdamTitleOf(await decryptGdamFile(g)); if(nm)gd.push({name:g.name,title:nm});}catch(_){}
  }
  for(const f of FILES.logs){
    let title="";
    const g=gd.find(x=>seedMatch(x.name,f.name)); if(g)title=g.title;
    if(!title){try{title=parseScenarioTitle(await f.slice(0,8192).text());}catch(_){}}
    f.__title=title;
  }
}
function loadLogText(name,text){
  const looksJson=/\.jsonl?$/i.test(name)||/^\s*\{/.test(text);
  let raw=looksJson?parseJSONL(text):parseTXT(text); if(!raw.length&&looksJson)raw=parseTXT(text);
  RAWCACHE=raw; buildAlias(); rebuild(raw);
  const sess=EVENTS.find(e=>e.kind==="system"&&/시작/.test(e.text));
  document.getElementById("meta").textContent=`${name} · ${EVENTS.length}개 · 시점 ${VIEWPOINTS.length}`+(REPLAY?" · .replay":"")+(sess?` · ${sess.text}`:"");
  renderSide(); renderMain();
}
// ── 정보 패널 섹션 접기 ── 헤더(h3.sech) 클릭 → 다음 h3.sech 전까지의 형제 요소를 접는다.
//  COLLAPSED(전역)에 접힌 id를 저장하고, 재렌더(실시간 상태 갱신 포함) 후 applyCollapsed()로 상태를 그대로 복원 → 마음대로 펴지지 않음.
function sh(id,title){ return `<h3 class="sech" data-sid="${id}" onclick="toggleSec(this)"><span class="secarrow">▾</span> ${title}</h3>`; }
function applyCollapsed(){
  const body=document.getElementById("infoBody"); if(!body)return;
  for(const h of body.querySelectorAll("h3.sech")){
    const collapsed=COLLAPSED.has(h.dataset.sid);
    const ar=h.querySelector(".secarrow"); if(ar)ar.textContent=collapsed?"▸":"▾";
    let el=h.nextElementSibling;
    while(el && !(el.tagName==="H3"&&el.classList.contains("sech"))){ el.style.display=collapsed?"none":""; el=el.nextElementSibling; }
  }
}
function toggleSec(h){ const id=h.dataset.sid; if(COLLAPSED.has(id))COLLAPSED.delete(id); else COLLAPSED.add(id); applyCollapsed(); }
// role_id/npc_id → 표시 이름 (배역 char_name → NPC 이름 → replay → 원본 id)
function scNameOf(rid){
  if(!rid) return rid;
  if(SCENARIO&&Array.isArray(SCENARIO.roles)) for(const r of SCENARIO.roles) if(r.role_id===rid) return r.char_name||r.name||rid;
  if(SCENARIO&&Array.isArray(SCENARIO.npcs))  for(const n of SCENARIO.npcs)  if(n.id===rid)      return n.name||rid;
  if(REPLAY&&Array.isArray(REPLAY.players))   for(const p of REPLAY.players) if(p.roleId===rid)  return p.charName||rid;
  return rid;
}
// 관계도 SVG — 인물 노드를 원형 배치하고 관계를 선+라벨로 잇는다.
function scRelSvg(rels){
  const ids=[]; for(const rr of rels) for(const rid of (rr.roles||[])) if(rid&&!ids.includes(rid)) ids.push(rid);
  if(ids.length<2) return "";
  const W=310, H=Math.max(210,70+ids.length*24), cx=W/2, cy=H/2, R=Math.min(cx,cy)-48;
  const pos={}; ids.forEach((id,i)=>{const a=-Math.PI/2+2*Math.PI*i/ids.length; pos[id]=[cx+R*Math.cos(a), cy+R*Math.sin(a)];});
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="background:var(--panel2);border:1px solid var(--line);border-radius:8px;margin-bottom:6px">`;
  for(const rr of rels){const rs=rr.roles||[]; if(rs.length<2)continue; const a=pos[rs[0]],b2=pos[rs[1]]; if(!a||!b2)continue;
    const mx=(a[0]+b2[0])/2, my=(a[1]+b2[1])/2;
    s+=`<line x1="${a[0].toFixed(0)}" y1="${a[1].toFixed(0)}" x2="${b2[0].toFixed(0)}" y2="${b2[1].toFixed(0)}" stroke="#4a5266" stroke-width="1.5"/>`;
    s+=`<text x="${mx.toFixed(0)}" y="${my.toFixed(0)}" fill="#9aa1b1" font-size="10" text-anchor="middle">${esc(rr.type||"")}</text>`;
  }
  for(const id of ids){const p=pos[id], nm=scNameOf(id);
    s+=`<circle cx="${p[0].toFixed(0)}" cy="${p[1].toFixed(0)}" r="6" fill="${colorFor(nm)}"/>`;
    s+=`<text x="${p[0].toFixed(0)}" y="${(p[1]-10).toFixed(0)}" fill="#e7e9ee" font-size="11" text-anchor="middle">${esc(nm)}</text>`;
  }
  return s+`</svg>`;
}
// 시나리오의 나머지 표시 가능한 모든 것: 관계도·NPC 상세(할일)·배역·타임라인·단서·아이템·제약.
function scenarioExtraHtml(){
  if(!SCENARIO) return "";
  const S=v=>v==null?"":String(v).trim(), J=a=>a.map(x=>esc(S(x))).filter(Boolean).join("<br>　");
  let h="";
  const rels=SCENARIO.relationships;
  if(Array.isArray(rels)&&rels.length){
    h+=sh('rel','관계도'); const svg=scRelSvg(rels); if(svg)h+=svg;
    for(const r of rels){const names=(r.roles||[]).map(scNameOf).filter(Boolean).join(" ↔ ");
      h+=`<div class="card"><b>${esc(names||"?")}</b> <span class="dim2">${esc(S(r.type))}</span>`
        +(S(r.description)?`<br>${esc(r.description)}`:"")
        +((r.mutual_contact||r.same_start_zone)?`<br><span class="dim2">${[r.mutual_contact?"서로 연락처 앎":"",r.same_start_zone?"같은 시작 구역":""].filter(Boolean).join(" · ")}</span>`:"")
        +`</div>`;}
  }
  if(Array.isArray(SCENARIO.npcs)&&SCENARIO.npcs.length){
    h+=sh('npc','NPC 상세');
    for(const n of SCENARIO.npcs){
      h+=`<div class="card"><b>${esc(n.name||n.id||"?")}</b> <span class="dim2">${esc(S(n.role_type))}${n.zone?" · "+esc(n.zone):""}${n.critical?" · ★핵심":""}${n.communicable===false?" · 대화불가":""}</span>`;
      if(S(n.motivation))  h+=`<br><span class="st">동기</span>${esc(n.motivation)}`;
      if(S(n.personality)) h+=`<br><span class="st">성격</span>${esc(n.personality)}`;
      const sched=n.schedule;
      if(Array.isArray(sched)&&sched.length){
        h+=`<div class="sub">할 일 · 일정</div>`;
        for(const s of sched){
          if(typeof s==="string"){h+=`<div class="tdesc">· ${esc(s)}</div>`;continue;}
          const when=S(s.time||s.when||s.turn||s.condition), what=S(s.action||s.goal||s.intent||s.what||s.plan), will=S(s.will);
          h+=`<div class="tdesc">· ${when?`<span class="dim2">[${esc(when)}]</span> `:""}${esc(what)}${will?` <span class="dim2">(의지:${esc(will)})</span>`:""}</div>`;
        }
      }
      const sp=[];
      if(S(n.true_role)) sp.push(`<span class="st">진짜역할</span>${esc(n.true_role)}`);
      if(Array.isArray(n.knowledge)&&n.knowledge.length) sp.push(`<span class="st">아는것</span>${J(n.knowledge)}`);
      if(sp.length)h+=`<div class="spoiler" style="margin-top:5px"><div class="teff" style="color:#ff9a8f">GM 전용</div>${sp.join("<br>")}</div>`;
      h+=`</div>`;
    }
  }
  if(Array.isArray(SCENARIO.roles)&&SCENARIO.roles.length){
    h+=sh('roles','배역');
    for(const r of SCENARIO.roles){
      h+=`<div class="card"><b>${esc(r.char_name||r.name||r.role_id||"?")}</b> <span class="dim2">${esc(S(r.name))}${r.zone?" · "+esc(r.zone):""}${r.is_core?" · ★핵심":""}</span>`;
      if(S(r.spawn_location)) h+=`<br><span class="st">등장</span>${esc(r.spawn_location)}`;
      if(Array.isArray(r.initial_info)&&r.initial_info.length) h+=`<br><span class="st">초기정보</span>${J(r.initial_info)}`;
      if(Array.isArray(r.hidden_info)&&r.hidden_info.length) h+=`<div class="spoiler" style="margin-top:5px"><span class="st" style="color:#ff9a8f">숨은정보</span>${J(r.hidden_info)}</div>`;
      h+=`</div>`;
    }
  }
  const tl=SCENARIO.timeline;
  if(tl&&typeof tl==="object"){
    h+=sh('timeline','사건 타임라인')+`<div class="card"><span class="dim2">${esc(S(tl.start_time))}~${esc(S(tl.end_time))} · 1턴 ${esc(S(tl.minutes_per_turn))}분 · 일상 ${esc(S(tl.daily_turns))}턴</span>`;
    if(Array.isArray(tl.main_events))for(const ev of tl.main_events){
      if(typeof ev==="string"){h+=`<br>· ${esc(ev)}`;continue;}
      h+=`<br>· ${S(ev.time)?`<span class="dim2">[${esc(S(ev.time))}]</span> `:""}<b>${esc(S(ev.label||ev.id))}</b>${S(ev.effect)?` — ${esc(S(ev.effect))}`:""}${ev.blockable?` <span class="dim2">(막을수있음)</span>`:""}`;
    }
    for(const k of ["1","2","3","4","5","6"]){const st=tl[k]; if(st&&(st.condition||st.effect))
      h+=`<br><span class="st">${k}단계</span>${esc(S(st.condition))}${S(st.effect)?" → "+esc(S(st.effect)):""}`;}
    h+=`</div>`;
  }
  if(Array.isArray(SCENARIO.clues)&&SCENARIO.clues.length){
    h+=`<div class="spoiler">`+sh('clues','배치 단서 · GM 전용');
    for(const c of SCENARIO.clues){const mis=c.type==="mislead"||c.mislead;
      h+=`<div class="card" style="margin:4px 0"><b>${esc(S(c.clue_subject)||S(c.id))}</b>${mis?` <span class="dim2" style="color:#ff9a8f">거짓 단서</span>`:` <span class="dim2">진짜</span>`}`
        +(S(c.location)?`<br><span class="st">위치</span>${esc(c.location)}`:"")
        +(S(c.content)?`<br>${esc(c.content)}`:"")+`</div>`;}
    h+=`</div>`;
  }
  if(Array.isArray(SCENARIO.key_items)&&SCENARIO.key_items.length){
    h+=sh('items','핵심 아이템');
    for(const it of SCENARIO.key_items){
      h+=`<div class="card"><b>${esc(it.name||it.id||"?")}</b> <span class="dim2">${esc(S(it.item_type||it.type))}</span>`
        +(S(it.description)?`<br>${esc(it.description)}`:"")
        +(S(it.location)?`<br><span class="st">위치</span>${esc(it.location)}`:"");
      const sp=[];
      if(S(it.clue_value)) sp.push(`<span class="st">단서가치</span>${esc(it.clue_value)}`);
      if(S(it.lore_info))  sp.push(`<span class="st">내막</span>${esc(it.lore_info)}`);
      if(Array.isArray(it.content)&&it.content.length) sp.push(`<span class="st">내용</span>${J(it.content)}`);
      if(sp.length)h+=`<div class="spoiler" style="margin-top:5px">${sp.join("<br>")}</div>`;
      h+=`</div>`;
    }
  }
  const cons=SCENARIO.constraints;
  if(cons&&typeof cons==="object"){
    h+=sh('cons','배경 · 제약')+`<div class="card">`;
    const flags=[];
    if(cons.era)flags.push("시대 "+S(cons.era));
    flags.push("휴대폰 "+(cons.phone_usable?"가능":"불가")); flags.push("외부연락 "+(cons.outside_contact?"가능":"두절"));
    flags.push("현장이탈 "+(cons.can_leave_scene?"가능":"불가"));
    if(cons.comms_monitored)flags.push("★통신 감청"); if(cons.comms_dangerous)flags.push("★통신 위험");
    h+=flags.map(esc).join(" · ");
    if(Array.isArray(cons.notes))for(const nt of cons.notes)h+=`<br>· ${esc(S(nt))}`;
    h+=`</div>`;
  }
  return h;
}
function renderInfo(){
  const b=document.getElementById("infoBody");let h="";
  const S=v=>v==null?"":String(v).trim();
  const row=(label,val)=>{const s=S(val);return s?`<br><span class="st">${esc(label)}</span>${esc(s)}`:"";};
  const rowArr=(label,val)=>{if(!Array.isArray(val))return "";const it=val.map(S).filter(Boolean);return it.length?`<br><span class="st">${esc(label)}</span>${it.map(esc).join(" · ")}`:"";};
  if(REPLAY){h+=sh('players',`플레이어 ${REPLAY.stage!=null?"(스테이지 "+REPLAY.stage+")":""}`);
    for(const p of (REPLAY.players||[])){const hp=Array.isArray(p.hp)?p.hp.join("/"):p.hp,san=Array.isArray(p.san)?p.san.join("/"):p.san;
      const stat=(cur,base)=>base!=null&&base!==cur?`${cur??"?"}<span class="dim2">(${base})</span>`:`${cur??"?"}`;
      h+=`<div class="card"><b style="color:${colorFor(p.charName||p.name)}">${esc(p.charName||p.name||"?")}</b> <span style="color:var(--dim)">${esc(p.job||"")} · ${p.age??"?"}세 · ${esc(p.zone||"")}</span><br>
        <span class="st">체력</span>${esc(hp)} <span class="st">정신</span>${esc(san)}<br>
        <span class="st">근력</span>${stat(p.str,p.baseStr)} <span class="st">매력</span>${stat(p.cha,p.baseCha)} <span class="st">행운</span>${stat(p.luk,p.baseLuk)} <span class="st">영감</span>${stat(p.spr,p.baseSpr)}
        <div class="dim2">스탯 5=평균 · 범위 1~20 · 괄호=기본값</div>`;
      if(Array.isArray(p.traits)&&p.traits.length){h+=`<div class="sub">능력 · 특성</div>`;
        for(const t of p.traits){
          const boosts=[["근",t.str_add],["매",t.cha_add],["행",t.luk_add],["영",t.spr_add],["체력",t.hp_max_add],["정신",t.san_max_add]].filter(x=>x[1]).map(x=>x[0]+(x[1]>0?"+":"")+x[1]).join(" ");
          h+=`<div class="trait"><span class="tr">✦ ${esc(t.name||"?")}</span>${t.grade?` <span class="grd">${esc(t.grade)}</span>`:""}${t.active?` <span class="act">발동</span>`:""}${t.level>1?` <span class="dim2">Lv.${t.level}</span>`:""}`;
          if(S(t.description))h+=`<div class="tdesc">${esc(t.description)}</div>`;
          if(boosts)h+=`<div class="tboost">스탯 ${esc(boosts)}</div>`;
          if(S(t.effect))h+=`<div class="teff">⚙ ${esc(t.effect)}</div>`;
          h+=`</div>`;}}
      h+=`</div>`;}}
  if(SCENARIO){const e=SCENARIO.entity||{},ai=e.ai_context||{},ph=e.physical||{};
    h+=sh('entity','괴담 개요')+`<div class="card"><b>${esc(e.name||"?")}</b> <span style="color:var(--dim)">${esc(S(SCENARIO.scale))}${e.type?" · "+esc(e.type):""}</span>`;
    h+=row("성격",ai.personality||ai.disposition);
    h+=(SCENARIO.world_rules&&SCENARIO.world_rules.core)?row("세계규칙",SCENARIO.world_rules.core):"";
    h+=rowArr("규칙",e.rules);
    h+=rowArr("숨은규칙",e.hidden_rules);
    h+=row("물리 피해",ph.harm);
    h+=row("금지어",e.forbidden_word);
    h+=`</div>`;
    const sol=[["약점",e.weakness],["해결책",e.solution],["공략",e.exploit_path],["탈출",e.escape],["제압",ph.defeat]]
      .map(x=>{const s=S(x[1]);return s?`<span class="st">${x[0]}</span>${esc(s)}`:"";}).filter(Boolean);
    if(sol.length)h+=`<div class="spoiler">`+sh('solution','대처법 · GM 전용(스포일러)')+`<div class="card" style="margin:0;background:transparent;border:0;padding:2px 0">${sol.join("<br>")}</div></div>`;
    if(Array.isArray(SCENARIO.zones)&&SCENARIO.zones.length){ // 구역(맵) — 이름·구역명 해석

  b.innerHTML=h||`<div class="empty">.replay(스탯)·.json/.gdam(시나리오)을 함께 불러오면 표시됩니다.</div>`;
  applyCollapsed(); // 접힌 섹션 상태 복원
  document.getElementById("toggleInfo").style.display=(REPLAY||SCENARIO)?"":"none";
}
function ingest(file){const nm=file.name.toLowerCase();
  if(nm.endsWith(".gdam")){return decryptGdamFile(file).then(j=>{if(j&&(j.entity||j.world_rules||j.npcs))SCENARIO=j;renderInfo();}).catch(()=>{renderInfo();});}
  return file.text().then(t=>{
  if(nm.endsWith(".replay")){try{REPLAY=JSON.parse(t);}catch(_){}if(RAWCACHE.length){buildAlias();rebuild(RAWCACHE);renderSide();renderMain();}renderInfo();return;}
  if(nm.endsWith(".json")){try{const j=JSON.parse(t);if(j.entity||j.world_rules||j.npcs)SCENARIO=j;else if(j.players)REPLAY=j;}catch(_){}if(REPLAY&&RAWCACHE.length){buildAlias();rebuild(RAWCACHE);renderSide();renderMain();}renderInfo();return;}
  loadLogText(file.name,t);renderInfo();});}
function ingestAll(fl){const files=[...fl];const meta=files.filter(f=>/\.(replay|json|gdam)$/i.test(f.name));const logs=files.filter(f=>/\.(jsonl|txt)$/i.test(f.name));
  Promise.all(meta.map(ingest)).then(()=>{if(logs[0])ingest(logs[0]);});}
// ★폴더 누적★: logs·replays·gdam이 서로 다른 폴더면, 각 폴더를 차례로 열어도 합쳐진다(초기화하지 않고 병합).
//  logs 폴더를 먼저 열고 → replays 폴더를 열면 이미 보던 로그가 이름·스탯까지 갖춰 다시 렌더된다.
function ingestFolder(fl){
  if(!FILES||!FILES.logs)FILES={logs:[],replays:[],scenarios:[],gdams:[]};
  const add=(arr,f)=>{ if(!arr.some(x=>x.name===f.name&&x.size===f.size))arr.push(f); };
  for(const f of fl){if(/\.(jsonl|txt)$/i.test(f.name))add(FILES.logs,f);else if(/\.replay$/i.test(f.name))add(FILES.replays,f);else if(/\.gdam$/i.test(f.name))add(FILES.gdams,f);else if(/\.json$/i.test(f.name))add(FILES.scenarios,f);}
  FILES.logs.sort((a,b)=>a.name.localeCompare(b.name));
  if(!FILES.logs.length){document.getElementById("meta").textContent="이 폴더엔 로그가 없습니다 — 먼저 logs 폴더를 여세요(replays·gdam은 이어서 열면 자동 결합).";resolveFolderTitles().then(renderSide);return;}
  const cur=FILES.logs.find(f=>f.__on)||FILES.logs.find(f=>/\.events\.jsonl$/i.test(f.name))||FILES.logs[0];
  openFolderLog(cur); // 보던 로그 유지 — 새로 합쳐진 replay/gdam을 반영해 다시 연다
  resolveFolderTitles().then(renderSide); // 파일 목록에 괴담 이름 표시(.gdam 복호화 우선)
}
// ★자동 탐색·결합★: 폴더 하나(상위 폴더 권장 — logs·replays·gdam을 품은 폴더)만 권한을 주면
//  하위 logs/replays/gdam을 ★재귀 순회★해 관련 파일을 모두 찾아 씨드로 자동 결합한다.
//  (브라우저 보안상 '파일 하나'만으로는 형제 폴더로 올라갈 수 없어, 폴더 권한 1회가 필요하다.)
// 최근 폴더 기억(IndexedDB) — 뷰어(logs/viewer.html)를 다시 열면 지난번 폴더를 기본으로 복원.
//  브라우저 보안상 html 자신의 경로를 직접 지정할 순 없으나, 한 번 고른 폴더를 저장·재사용해 사실상 기본 경로가 되게 한다.
const DIRDB="trpg-viewer", DIRKEY="lastDir";
function idbGet(){return new Promise(res=>{try{const r=indexedDB.open(DIRDB,1);
  r.onupgradeneeded=()=>{try{r.result.createObjectStore("h");}catch(_){}};
  r.onsuccess=()=>{try{const g=r.result.transaction("h","readonly").objectStore("h").get(DIRKEY);
    g.onsuccess=()=>res(g.result||null); g.onerror=()=>res(null);}catch(_){res(null);}};
  r.onerror=()=>res(null);}catch(_){res(null);}});}
function idbSet(h){try{const r=indexedDB.open(DIRDB,1);
  r.onupgradeneeded=()=>{try{r.result.createObjectStore("h");}catch(_){}};
  r.onsuccess=()=>{try{r.result.transaction("h","readwrite").objectStore("h").put(h,DIRKEY);}catch(_){}};}catch(_){}}

async function discoverFromHandle(root){
  document.getElementById("meta").textContent="자동 탐색 중…";
  const files=[];
  async function walk(dir,depth){
    if(depth>5) return; // 폭주 방지(깊이 제한)
    try{ for await (const entry of dir.values()){
      if(entry.kind==="file"){ if(/\.(jsonl|txt|replay|json|gdam)$/i.test(entry.name)){ try{ files.push(await entry.getFile()); }catch(_){} } }
      else if(entry.kind==="directory"){ await walk(entry,depth+1); }
    } }catch(_){}
  }
  await walk(root,0);
  if(!files.length){ document.getElementById("meta").textContent="선택한 폴더에서 로그/리플레이/시나리오를 찾지 못했습니다(상위 폴더를 선택했는지 확인)."; return; }
  ingestFolder(files); // 기존 누적·씨드 매칭 흐름 재사용(logs·replays·gdam 자동 결합)
}
async function autoDiscover(){
  if(!window.showDirectoryPicker){ // File System Access 미지원(파이어폭스 등) → 폴더 열기로 대체 안내
    document.getElementById("meta").textContent="이 브라우저는 자동 탐색 미지원 → '폴더 열기'로 상위 폴더(logs·replays·gdam 포함)를 선택하세요(자동 결합됨).";
    dirEl.click(); return;
  }
  const last=await idbGet();               // 지난번 폴더를 기본 시작 위치로
  let root; try{ root=await window.showDirectoryPicker({id:"trpg-viewer",mode:"read",startIn:last||undefined}); }catch(_){ return; }
  idbSet(root);                            // 다음 번 기본 경로로 저장
  await discoverFromHandle(root);
}
// 로드 시: 지난번 폴더 권한이 아직 살아 있으면 조용히 자동 복원(= 그 폴더가 기본 경로처럼 동작).
//  권한이 만료됐으면 버튼을 '최근 폴더 다시 열기'로 바꿔 클릭 한 번에 복원(권한 재요청엔 제스처 필요).
async function tryRestoreLastDir(){
  if(!window.showDirectoryPicker) return;
  let h; try{ h=await idbGet(); }catch(_){ return; } if(!h) return;
  try{
    const st=await h.queryPermission({mode:"read"});
    if(st==="granted"){ await discoverFromHandle(h); return; }
  }catch(_){}
  const b=document.getElementById("pickAuto");
  if(b){ b.textContent="📂 최근 폴더 다시 열기";
    b.onclick=async()=>{ try{ if(await h.requestPermission({mode:"read"})==="granted"){ idbSet(h); await discoverFromHandle(h); return; } }catch(_){} autoDiscover(); }; }
}
// 씨드 정규화(핵심): 로그·리플레이·gdam이 ★서로 다른 폴더·다른 파일명 규칙★이어도 같은 게임으로 묶이게 한다.
//  로그 "<seed>#<run>.txt" / 리플레이 "S<stage>_<seed>_<hexT시각>.replay" / gdam "<seed>.gdam" → 공통 영숫자 코어로 축약.
function seedKey(n){
  let s=(n||"").replace(/\.(events\.)?(jsonl|txt|json|replay|gdam)$/i,""); // 확장자
  s=s.replace(/^S\d+_/i,"");             // 리플레이 스테이지 접두 S3_
  s=s.replace(/_[0-9A-Za-z]+T\d+$/,"");  // 리플레이 날짜·시각 접미 _3FA16T2026
  s=s.replace(/[#_]\d+$/,"");            // 실행 회차 #1 / _1
  return s.replace(/[^A-Za-z0-9]/g,"").toUpperCase(); // 영숫자 코어(대문자)
}
// 두 파일이 같은 게임인지: 코어 일치 또는 포함(회차 '#' 유실 등 변형 흡수).
function seedMatch(a,b){a=seedKey(a);b=seedKey(b);return !!a&&!!b&&(a===b||a.includes(b)||b.includes(a));}
function openFolderLog(f){FILES.logs.forEach(x=>x.__on=false);f.__on=true;REPLAY=null;SCENARIO=null;
  const rep=FILES.replays.find(x=>seedMatch(x.name,f.name)),sc=FILES.scenarios.find(x=>seedMatch(x.name,f.name));
  const gd=(FILES.gdams||[]).find(x=>seedMatch(x.name,f.name));const jobs=[];
  if(rep)jobs.push(rep.text().then(t=>{try{REPLAY=JSON.parse(t);}catch(_){}}));
  if(sc)jobs.push(sc.text().then(t=>{try{const j=JSON.parse(t);if(j.entity||j.world_rules||j.npcs)SCENARIO=j;else if(j.players&&!REPLAY)REPLAY=j;}catch(_){}}));
  else if(gd)jobs.push(decryptGdamFile(gd).then(j=>{if(j&&(j.entity||j.world_rules||j.npcs))SCENARIO=j;}).catch(()=>{})); // .json 없으면 원본 .gdam 복호화로 시나리오 표시
  Promise.all(jobs).then(()=>f.text()).then(t=>{loadLogText(f.name,t);renderInfo();});}

const fileEl=document.getElementById("file"),dirEl=document.getElementById("dir");
document.getElementById("pick").onclick=()=>fileEl.click();
document.getElementById("pickDir").onclick=()=>dirEl.click();
document.getElementById("pickAuto").onclick=autoDiscover;
document.getElementById("toggleInfo").onclick=()=>{renderInfo();document.getElementById("info").classList.toggle("open");};
fileEl.onchange=e=>{if(e.target.files.length)ingestAll(e.target.files);};
dirEl.onchange=e=>{if(e.target.files.length)ingestFolder(e.target.files);};
const drop=document.getElementById("drop");
["dragenter","dragover"].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
["dragleave","drop"].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();if(ev==="dragleave"&&e.relatedTarget)return;drop.classList.remove("drag");}));
document.addEventListener("drop",e=>{const fs=e.dataTransfer?.files;if(fs&&fs.length)ingestAll(fs);});
tryRestoreLastDir(); // 지난번 폴더를 기본 경로처럼 자동 복원(권한 남아있으면 즉시, 아니면 버튼 클릭 1회)
</script>
</body>

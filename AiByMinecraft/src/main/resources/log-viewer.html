<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>괴담 TRPG 로그 뷰어</title>
<style>
  :root{ --bg:#14161c; --panel:#1c1f27; --panel2:#232733; --line:#2e3340;
    --txt:#e7e9ee; --dim:#9aa1b1; --accent:#7aa2ff;
    --input:#9ad27a; --gm:#cdbbff; --npc:#ffd27a; --ability:#ff8a8a; --system:#6f7686; --broadcast:#7adfff; --vital:#ff6b8a; }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;display:flex;flex-direction:column;height:100vh}
  /* ★헤더는 절대 줄바꿈하지 않는다★: 긴 시나리오 제목이 들어와도 meta만 줄어들어(...) 버튼이 다음 줄로 밀려
     레이아웃 뒤에 가려 '자동 탐색·결합 버튼이 사라지던' 문제 방지. 페이지를 flex 세로로 잡아 레이아웃이 항상 헤더 아래. */
  header{padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:nowrap;z-index:5;flex:none}
  header h1{font-size:15px;margin:0;font-weight:600;flex:none;white-space:nowrap}
  header .meta{color:var(--dim);font-size:12px;flex:1 1 0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  header button{flex:none}
  .layout{display:flex;flex:1;min-height:0}
  aside{width:250px;min-width:250px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:8px}
  aside h2{font-size:11px;text-transform:uppercase;color:var(--dim);letter-spacing:.05em;margin:12px 6px 6px}
  .vp{padding:7px 10px;border-radius:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;gap:6px}
  .vp:hover{background:var(--panel2)} .vp.active{background:var(--accent);color:#0d1018;font-weight:600}
  .vp .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .vp .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .vp .acct{font-size:10px;color:var(--dim);flex:none;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;opacity:.85;max-width:44%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap} .vp.active .acct{color:#0d1018;opacity:.75}
  .vp .cnt{font-size:11px;color:var(--dim);flex:none} .vp.active .cnt{color:#0d1018}
  .filelist .fl{padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filelist .fl:hover{background:var(--panel2);color:var(--txt)} .filelist .fl.on{background:var(--panel2);color:var(--accent)}
  main{flex:1;overflow-y:auto;padding:14px 18px}
  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;position:sticky;top:0;background:var(--bg);padding:4px 0;z-index:3}
  .toolbar input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 10px;border-radius:7px;min-width:180px}
  .toolbar label{color:var(--dim);display:flex;gap:5px;align-items:center;cursor:pointer;user-select:none}
  .toolbar button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 11px;border-radius:7px;cursor:pointer}
  .toolbar button.on{background:var(--accent);color:#0d1018;border-color:var(--accent);font-weight:600}
  .toolbar input[type=range]{vertical-align:middle;width:110px}
  .ev{border:1px solid var(--line);border-left-width:4px;border-radius:10px;background:var(--panel);padding:9px 13px;margin-bottom:8px;max-width:920px;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .ev .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;margin-bottom:3px}
  .ev.compact{padding:5px 13px} .ev.compact .top{margin-bottom:0}
  .ev.compact .cbody{color:#dfe2ea;line-height:1.5;overflow-wrap:anywhere} /* 메타 이벤트 인라인 내용 */
  .ev.abil-act{padding:5px 13px} .ev.abil-act .top{margin-bottom:0}
  .ev.abil-act .act-msg{color:#e7c9ff;font-weight:600} /* 능력 발동 — 한 줄 표기(요청) */
  .ev .t{color:var(--dim);font-variant-numeric:tabular-nums;font-size:12px;flex:none}
  .ev .badge{font-size:11px;padding:1px 7px;border-radius:20px;background:var(--panel2);color:var(--dim)}
  .ev .who{font-weight:600} .ev .arrow{color:var(--dim)} .ev .top .gt{color:#7fb8d6;font-size:.82em;opacity:.9} /* 인게임 시각(게임시간) */
  .ev.split{margin-left:18px;border-left:2px solid var(--line)} .ev .top.cont{opacity:.55}
  .ln{white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;line-height:1.6;color:#dfe2ea;margin:2px 0;animation:pop .16s ease}
  .ln.bc{color:var(--broadcast);font-weight:600} .ln.mono{color:#c9b3ff;font-style:italic}
  .tw.typing::after{content:"▌";margin-left:1px;color:var(--dim);animation:twcaret .7s steps(1) infinite} /* 대화 한 글자씩 타이핑 커서 */
  @keyframes twcaret{50%{opacity:0}}
  .droll{display:inline-block;color:#ffd27a;font-weight:700;font-variant-numeric:tabular-nums} /* 주사위 눈 — 재생 시 구르다 착지 */
  .droll.rolling{text-shadow:0 0 7px rgba(255,205,120,.65)}
  .droll.land{color:#b9f0c8;text-shadow:0 0 13px rgba(140,240,170,.75);animation:rollland .42s cubic-bezier(.2,1.5,.4,1)}
  @keyframes rollland{0%{transform:scale(1.55);filter:brightness(1.9)}55%{transform:scale(.9)}100%{transform:scale(1)}}
  /* ★주사위 전용 카드★ — 결과를 미리 안 보여주고(긴장감), 굴림 착지 후 반짝→결과 공개→칸 색 변경(성공=초록·실패=자홍) */
  .ev.k-dice{border-left-color:#8f9bb0;background:#1a1e2c;transition:background .35s,border-color .35s}
  .ev.k-dice .badge{background:#3a4157;color:#e6ebf7}
  .ev.k-dice .dth{color:var(--dim)} .ev.k-dice .dmod{color:#9fb4d8;font-size:12px}
  .ev.k-dice .doutcome{font-weight:800;margin-left:4px}
  .ev.k-dice.res-ok{border-left-color:#3ddc84;background:#15251c} .ev.k-dice.res-ok .doutcome{color:#7defb0}
  .ev.k-dice.res-part{border-left-color:#e0b34a;background:#272113} .ev.k-dice.res-part .doutcome{color:#ffd27a}
  .ev.k-dice.res-fail{border-left-color:#e0559d;background:#291526} .ev.k-dice.res-fail .doutcome{color:#ff8fce}
  .ev.k-dice.flash{animation:dflash .55s ease}
  @keyframes dflash{0%{filter:brightness(1)}40%{filter:brightness(2.5) saturate(1.35)}100%{filter:brightness(1)}}
  /* ★보정 단계 칩★ — 굴림 뒤 하나씩 더해지는 연출: 각 보정이 나타나며 숫자가 bump(깜빡·튐)로 오르내린다(요청) */
  .ev.k-dice .dsteps{display:inline}
  .ev.k-dice .dstep{display:inline-block;margin-left:6px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;transition:opacity .2s,transform .2s}
  .ev.k-dice .dstep i{font-style:normal;opacity:.72;font-size:11px;margin-left:1px;font-weight:600}
  .ev.k-dice .dstep.pos{color:#7fd8a4} .ev.k-dice .dstep.neg{color:#f0a0cb}
  .ev.k-dice .dstep.pend{opacity:0;transform:translateY(-4px)}   /* 아직 안 더해진 보정 — 숨김(재생 시) */
  .droll.bump{animation:drollbump .36s cubic-bezier(.2,1.6,.4,1)}
  @keyframes drollbump{0%{transform:scale(1)}34%{transform:scale(1.42);text-shadow:0 0 13px rgba(255,215,140,.95)}100%{transform:scale(1)}}
  /* ★선택지 카드★ — 전부 출력 후 ❯ 반짝으로 '골라졌다' 공개(요청). 등급 색: 정답·최적=초록, 무난=금, 역효과=자홍 */
  .ev.k-choice{border-left-color:#c9a2ff;background:#1d1930;transition:border-color .35s}
  .ev.k-choice .badge{background:#4a3f6e;color:#e9defc}
  .ev.k-choice .choice-opt{padding:1px 0;color:#cfd3de}
  .ev.k-choice .choice-opt .cmark{color:#ffd27a;font-weight:800}
  .ev.k-choice .choice-opt.pick{color:#ffe9a8;font-weight:700;animation:dflash .5s ease}
  .ev.k-choice .cgrade{font-size:11px;font-weight:700}
  .ev.k-choice.res-ok{border-left-color:#3ddc84} .ev.k-choice .cgrade.res-ok{color:#7defb0}
  .ev.k-choice.res-part{border-left-color:#e0b34a} .ev.k-choice .cgrade.res-part{color:#ffd27a}
  .ev.k-choice.res-fail{border-left-color:#e0559d} .ev.k-choice .cgrade.res-fail{color:#ff8fce}
  /* ★재생 특수효과★ — 능력=보랏빛 파동 · 피해=흔들림·붉게 · 회복=초록 파동 · 아이템=금빛 · 단서=청록 빛 */
  .ev.fx-abil{animation:abilglow .9s ease}
  @keyframes abilglow{0%{box-shadow:none}35%{box-shadow:0 0 18px rgba(199,148,255,.55)}100%{box-shadow:none}}
  .ev.fx-hurt{animation:hurtfx .5s ease}
  @keyframes hurtfx{0%,100%{transform:none;filter:none}20%{transform:translateX(-4px);filter:brightness(1.5) saturate(1.6)}45%{transform:translateX(4px)}70%{transform:translateX(-2px)}}
  .ev.fx-heal{animation:healfx .8s ease}
  @keyframes healfx{40%{box-shadow:inset 0 0 22px rgba(90,230,150,.35);filter:brightness(1.2)}}
  .ev.fx-item{animation:itemfx .7s ease} @keyframes itemfx{30%{filter:brightness(1.6) sepia(.3)}}
  .ev.fx-clue{animation:cluefx .8s ease} @keyframes cluefx{35%{filter:brightness(1.45);box-shadow:0 0 14px rgba(102,200,176,.5)}}
  .ev.self{border-left-color:var(--input)} /* @입력을 접고 남긴 내 통신 카드 = 내 발화(초록 테두리, 개별뷰에선 .me 배경까지) */
  .ln.say b{font-weight:700}
  .sp{height:7px}
  .ev.me{border-left-color:var(--input);background:#1b2418} .ev.me .top .who{color:var(--input)}
  /* 다른 사람 행동/대사: 예전엔 우측 정렬(margin-left:auto)이라 오른쪽 끝까지 밀려 읽기 불편 → ★왼쪽에서 약간만 들여쓰기★로 변경(가독성 우선, 내 것과는 들여쓰기로 구분). */
  .ev.other{margin-left:34px} .ev.other .top{justify-content:flex-start}
  .ev.k-input{border-left-color:var(--input)} .ev.k-gm{border-left-color:var(--gm)} .ev.k-npc{border-left-color:var(--npc)}
  .ev.k-ability{border-left-color:var(--ability);background:#251c22} .ev.k-system{border-left-color:var(--system);opacity:.85}
  .ev.k-broadcast{border-left-color:var(--broadcast)} .ev.k-gm_input{border-left-color:#444b5a;opacity:.72}
  .ev.k-private{border-left-color:#8f9bb0}
  .ev.k-thought{border-left-color:#9b8fc4;background:#1c1a24;opacity:.92} .ev.k-thought .body .ln{font-style:italic;color:#bcb4da}
  .ev.k-thought .badge{background:#9b8fc4;color:#1c1a24}
  .ev .thought-inline{font-style:italic;color:#9b8fc4;opacity:.92;font-size:12px;margin-bottom:4px;padding-left:6px;border-left:2px solid #6a5f8c} /* #245 병합된 속마음 줄 */
  .ev .thought-inline .ti-txt{color:#bcb4da}
  .ev.k-vital{border-left-color:var(--vital);background:#2a1820}
  .ev.k-ability .badge{background:var(--ability);color:#2a0f0f}
  .ev.k-vital .badge{background:var(--vital);color:#2a0f14}
  .ev.k-item{border-left-color:#e0c56a;background:#241f14} .ev.k-item .badge{background:#e0c56a;color:#2a230f}
  .ev.k-clue{border-left-color:#66c8b0;background:#14231f} .ev.k-clue .badge{background:#66c8b0;color:#0f2a23}
  .ev.k-timeline{border-left-color:#e0a24a;background:#241d12} .ev.k-timeline .badge{background:#e0a24a;color:#2a1f0f} /* 타임라인 사건 — GM 전용(전체뷰만) */
  .ev.k-shout,.ev.k-letter,.ev.k-whisper{border-left-color:var(--broadcast)}
  .ln.tamper-orig{color:var(--dim);text-decoration:line-through;opacity:.72}
  .ln.tamper-new{color:#ff9a6b;font-weight:600}
  .tamper-tag{font-size:11px;color:var(--dim);margin-right:5px}
  #info .know{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:7px;font-size:1em;line-height:1.55}
  #info .know .hp{color:var(--vital)} #info .know .san{color:#7aa2ff}
  #info .know .kitem{color:#e0c56a} #info .know .kclue{color:#66c8b0}
  #info .know .khead{font-weight:600;margin-bottom:3px} #info .live{color:#ff9a6b;font-size:11px}
  .pill{font-size:11px;padding:1px 7px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}
  .drop{margin:50px auto;max-width:600px;border:2px dashed var(--line);border-radius:14px;padding:44px 24px;text-align:center;color:var(--dim);background:var(--panel)}
  .drop.drag{border-color:var(--accent);color:var(--txt);background:var(--panel2)}
  .drop b{color:var(--txt)} code{background:var(--panel2);padding:1px 5px;border-radius:4px;color:#bcd0ff}
  .empty{color:var(--dim);text-align:center;padding:30px}
  button.file{background:var(--accent);color:#0d1018;border:0;padding:7px 13px;border-radius:7px;font-weight:600;cursor:pointer}
  button.file.alt{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  button.file.liveon{background:#1f7a4d;color:#eafff2;border-color:#2fae6e}
  #info{position:fixed;right:0;top:53px;bottom:0;width:340px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:12px 14px;transform:translateX(100%);transition:transform .2s;z-index:6;font-size:calc(13px * var(--ifs,1))}
  #infoResize{position:absolute;left:0;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:7;background:linear-gradient(90deg,rgba(255,255,255,.10),transparent)}
  #infoResize:hover{background:linear-gradient(90deg,var(--accent),transparent)}
  #info.open{transform:none}
  #info h3{font-size:13px;margin:14px 0 6px;color:var(--accent)}
  #info .card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:7px;font-size:1em;line-height:1.5}
  #info .st{display:inline-block;min-width:58px;color:var(--dim)} #info .tr{color:#ffd27a}
  #info .sub{color:var(--dim);font-size:11px;margin:5px 0 2px;text-transform:uppercase;letter-spacing:.04em}
  #info .dim2{color:var(--dim);font-size:11px}
  /* 이름 칩 토글: 플레이어·NPC·배역·핵심아이템을 칩으로 골라 하나씩 상세 보기 */
  #info .chiprow{display:flex;flex-wrap:wrap;gap:4px;margin:1px 0 6px}
  #info .chip{cursor:pointer;font-size:12px;padding:2px 10px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--dim);user-select:none;white-space:nowrap}
  #info .chip:hover{border-color:#6a5a9a;color:#cbd3e6}
  #info .chip.on{background:#2a2450;border-color:#7a68b0;color:#eae4ff;font-weight:600}
  #info .trait{border-top:1px solid var(--line);padding:4px 0 3px}
  #info .trait:first-of-type{border-top:0}
  #info .grd{color:#ffd27a;font-weight:600}
  #info .act{font-size:10px;color:var(--accent);border:1px solid var(--line);border-radius:10px;padding:0 5px}
  #info .tdesc{margin:2px 0;color:var(--txt)}
  #info .teff{color:var(--dim);font-size:11px}
  #info .tboost{color:#8fe0a0;font-size:11px}
  #info .spoiler{border:1px dashed #7a4a4a;border-radius:8px;padding:0 8px 6px;margin:6px 0;background:rgba(150,70,70,.08)}
  #info .spoiler h3{color:#ff9a8f}
  #info h3.sech{cursor:pointer;user-select:none} #info h3.sech:hover{filter:brightness(1.15)}
  #info h3.sech .secarrow{color:var(--dim);font-size:11px;margin-right:2px}
  .infoClose{float:right;cursor:pointer;color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1>🩸 괴담 TRPG 로그 뷰어</h1>
  <span class="meta" id="meta">로그를 불러오세요</span>
  <button class="file" id="pickAuto">🔍 자동 탐색·결합</button>
  <button class="file alt" id="pick">파일 열기</button>
  <button class="file alt" id="pickDir">📁 폴더 열기</button>
  <button class="file alt" id="toggleInfo" style="display:none">📊 스탯·시나리오</button>
  <button class="file alt" id="scrollBtm" title="맨 아래로 내리기">⬇ 맨아래</button>
  <button class="file alt" id="live" title="파일이 갱신되면 새로고침 없이 자동으로 다시 읽어 맨 아래로 (크롬 계열 + '자동 탐색·결합'으로 폴더 열기 필요)">🔴 실시간</button>
  <input type="file" id="file" accept=".jsonl,.json,.txt,.replay,.gdam" multiple style="display:none">
  <input type="file" id="dir" webkitdirectory directory multiple style="display:none">
</header>
<div class="layout">
  <aside id="side"><div class="empty" style="padding:20px 8px">시점 목록</div></aside>
  <main id="main">
    <div class="drop" id="drop">
      <p>📂 <b>로그 파일을 여기에 끌어다 놓으세요</b></p>
      <p>권장: <code>씨드#n.events.jsonl</code> · 또는 <code>씨드#n.txt</code> · 함께 <code>.replay</code>/<code>.json</code>/<code>.gdam</code></p>
      <p><b>🔍 자동 탐색·결합</b> — <code>logs</code>·<code>replays</code>·<code>gdam</code>을 품은 <b>상위 폴더</b>를 한 번 선택하면 하위를 훑어 이름·스탯·시나리오까지 자동 결합</p>
      <p><b>📁 폴더 열기</b> — 폴더가 따로면 <code>logs</code>→<code>replays</code>→<code>gdam</code>을 차례로 열어도 자동 누적·결합</p>
    </div>
  </main>
</div>
<div id="info"><div id="infoResize" title="좌우로 드래그해 너비·글씨 크기 조절"></div><span class="infoClose" onclick="document.getElementById('info').classList.remove('open')">✕ 닫기</span><div id="infoBody"></div></div>
<script>
"use strict";
let EVENTS=[], VIEWPOINTS=[], curVP="__all__";
let ALIAS={}, REPLAY=null, SCENARIO=null, RAWCACHE=[], KNOWN=new Set(), CONTACTS={}, ACCT={};
let HAS_NATIVE_COMM=false; // 로그에 통신(통신/call…) 이벤트가 이미 있으면 @입력을 통화로 재분류 안 함(통화 이중표시 방지)
let FILES={logs:[],replays:[],scenarios:[],gdams:[]};
let playing=false, speed=1, queue=[], qi=0, qtimer=null, curBodyEl=null;
let COLLAPSED=new Set(); // 정보 패널에서 접어둔 섹션 id — 재렌더(실시간 갱신 포함)에도 상태 유지
let ITEM_OPEN=new Set(); // 가진 아이템 중 세부정보를 펼쳐둔 이름 — 재렌더·재생 갱신에도 유지

      const rm=bodyText.match(/^\[→([^\]]+)\]\s*([\s\S]*)$/);

// 특정 인물의 seq 시점 구역(마지막 이동 기준). 이동 기록이 없으면 null(불명).
function zoneAtSeq(person,seq){ let z=null; for(const e of EVENTS){ if((e.seq||0)>seq)break; if(e.kind==="move"&&e.actor===person&&e.zone)z=e.zone; } return z; }
function isPlayerVp(vp){ const v=VIEWPOINTS.find(x=>x.name===vp); return v?!!v.isPlayer:false; }
// ★실제로 닿은 것만★ 표시(#174): 플레이어·NPC 공통. 전체(전역)는 플레이어만 받고 NPC는 못 본다(비용상 게임도 NPC 미수신).
function visibleTo(e,vp){
  if(vp==="__all__")return true;

  if(e.to.includes(vp))return true;                    // 나를 수신자로 명시(통화·지목·전체발신 실제 수신자)
  if(e.to.some(isGlobal))return isPlayerVp(vp);        // '전체' 대상 = 플레이어만(전체는 NPC가 못 봄)
  if(e.kind==="system")return true;                    // 세션·구획 표식(내용 아님)
  if(e.kind==="broadcast"){                            // 방송(PA): GM/시스템 안내방송은 플레이어 전원, 인물의 육성 방송은 같은 구역만
    if(isGlobal(e.actor))return isPlayerVp(vp);

  }

  if(e.kind==="ability"){ // ★겉으로 드러난(overt) 물리 능력·판정만★ 같은 구역이 목격. 은밀한 감지·정보 능력(overt 아님)은 시전자 전용.
    if(!e.overt)return false; const az=zoneAtSeq(e.actor,e.seq||0), vz=zoneAtSeq(vp,e.seq||0); return az!=null&&vz!=null&&az===vz; }
  return false; }
function buildViewpoints(){ const m=new Map();
  for(const e of EVENTS){ if(e.kind==="alias"||e.kind==="timeline")continue; for(const c of [e.actor,...e.to])if(isPerson(c))m.set(c,(m.get(c)||0)+1); }

  const players=new Set();
  const uni=(nm,jb)=>{nm=(nm||"").trim();jb=(jb||"").trim();return (nm&&jb)?nm+"("+jb+")":(nm||jb);};
  if(REPLAY&&Array.isArray(REPLAY.players))for(const p of REPLAY.players){if(p.charName){players.add(canon(p.charName));players.add(uni(p.charName,p.job));}}
  for(const e of EVENTS){ if(e.kind==="input"&&isPerson(e.actor))players.add(e.actor); }
  VIEWPOINTS=[...m.entries()].map(([name,count])=>({name,count,isPlayer:players.has(name)})).sort((a,b)=>b.count-a.count); }

// ── 본문 파싱: 방송/독백/대사/서술 + 문단(빈 줄) 분리 ──
function parseBody(text){
  const out=[];
  for(const raw of (text||"").split(/\n/)){
    const line=raw.trim();
    if(!line){ out.push({type:"br"}); continue; }
    let m;
    if(m=line.match(/^\[([^\]]{1,16})\]\s*(.*)$/)){
      const tag=m[1].trim();
      if(BC_TAG.test(tag)){ out.push({type:"bc",text:m[2]||line}); continue; }
      if(!DENY_TAG.test(tag) && /^[가-힣A-Za-z0-9_ ]{2,14}$/.test(tag) && m[2]){ out.push({type:"say",name:tag,text:m[2]}); continue; } // 단역 호칭(헤드셋 낀 남자 등)도 화자 칸 분리
      out.push({type:"narr",text:line}); continue;
    }
    if(m=line.match(/^<-\s*([\s\S]*?)\s*->$/)){ out.push({type:"mono",text:m[1]}); continue; }
    out.push({type:"narr",text:line});
  }
  return out;
}

function diceSpanify(safe){ return safe.replace(/\bd(\d{1,3})=(\d{1,4})\b/g,(m,mx,fin)=>`d${mx}=<span class="droll" data-max="${mx}" data-final="${fin}">${fin}</span>`); }
function blockHtml(b){
  if(b.type==="br") return `<div class="sp"></div>`;
  if(b.type==="bc") return `<div class="ln bc">📢 ${esc(b.text)}</div>`;
  if(b.type==="mono") return `<div class="ln mono">「${esc(b.text)}」</div>`;
  if(b.type==="say") return `<div class="ln say"><b style="color:${colorFor(b.name)}">${esc(b.name)}</b> ${esc(b.text)}</div>`;
  return `<div class="ln">${diceSpanify(esc(b.text))}</div>`;
}
// ★재생속도 동기화 배수★ — 속도 슬라이더(0.4~3)가 빠르면 연출도 짧게, 느리면 길고 진하게(요청).
function fxk(){ return 1/Math.max(0.25, speed); }
// ★감속 숫자 굴림★ — 프레임 간격이 점점 벌어지며(ease-out) 최종값에 '착지'. 속도와 동기화·done 콜백.
function rollNumber(el,max,fin,frames,g0,g1,done){ if(!el){done&&done();return;} el.classList.add("rolling"); let n=0;
  const tick=()=>{ if(!el.isConnected){done&&done();return;}
    if(n>=frames){ el.textContent=fin; el.classList.remove("rolling"); el.classList.add("land"); done&&done(); return; }
    el.textContent=1+Math.floor(Math.random()*max); const p=n/frames; n++;
    setTimeout(tick,(g0+(g1-g0)*p*p)*fxk()); };
  tick(); }
// 서술 속 dN=M 숫자 굴림(범용) — 14프레임 감속(~0.9초, 속도 동기화).
function animateDrolls(scope){ if(!scope||!scope.querySelectorAll)return;
  for(const el of scope.querySelectorAll(".droll:not(.don)")){ el.classList.add("don");
    const max=Math.max(2,parseInt(el.dataset.max)||20), fin=el.dataset.final||el.textContent;
    rollNumber(el,max,fin,14,34,120);
  } }
// ── ★대화 타이핑★: 통화·근처·귓속말 등 '상호 대화'와 대사(say)를 한 글자씩 노출(재생속도 비례, 요청). GM 서술은 제외 ──
// ★npc는 제외★ — NPC 자율출력은 대사가 아니라 행동·서술이 섞인 통짜라, 통째로 타이핑하면 모든 행동이 대화처럼 느려진다(버그).
//   NPC 대사는 통신류(통화·근처 등)나 서술 속 대사(say 블록)로 들어오며 그쪽에서 타이핑된다.
const TYPE_KINDS=new Set(["call","nearby","broadcast","shout","letter","whisper","signal","psychic"]);
function isConvoEvent(e){ return !!e && TYPE_KINDS.has(e.kind); }
// 타이핑 대상? 대사(say)는 항상, 서술(narr)은 통신류 이벤트일 때만(GM 서술문은 제외).
function typeBlock(b,e){ if(!b)return false; if(b.type==="say")return true; if(b.type==="narr"&&isConvoEvent(e))return true; return false; }
// 타이핑용 빈 껍데기 — 화자·구조는 즉시, 본문 자리엔 빈 .tw 스팬만.
function blockShell(b){ if(b.type==="say")return `<div class="ln say"><b style="color:${colorFor(b.name)}">${esc(b.name)}</b> <span class="tw"></span></div>`;
  return `<div class="ln"><span class="tw"></span></div>`; }
// 한 글자씩 노출 — 22ms×fxk(재생속도 비례). textContent라 HTML 파싱·XSS 무관·안전.
function typeInto(span,text,done){ if(!span){done&&done();return;}
  const chars=Array.from(text||""); let i=0; span.textContent=""; span.classList.add("typing");
  const tick=()=>{ if(!span.isConnected){ span.textContent=text||""; span.classList.remove("typing"); done&&done(); return; }
    if(i>=chars.length){ span.classList.remove("typing"); done&&done(); return; }
    span.textContent+=chars[i++];
    if(i%16===0){ const c=span.closest(".ev"); if(c)c.scrollIntoView({block:"end"}); }
    setTimeout(tick,22*fxk()); };
  tick(); }
// 블록 1개를 컨테이너에 붙인다 — 대화면 타이핑, 아니면 즉시(+굴림). 시크(instant)면 항상 즉시.
function appendBlock(container,b,e,instant){
  if(!instant && typeBlock(b,e)){ container.insertAdjacentHTML("beforeend",blockShell(b));
    typeInto(container.lastElementChild.querySelector(".tw"), b.text); }
  else { container.insertAdjacentHTML("beforeend",blockHtml(b)); if(!instant)animateDrolls(container.lastElementChild); }
}
// ── ★주사위 전용 카드★: 결과를 미리 안 보여주고(긴장감), 굴림 → 착지 → 칸 반짝 → 결과 공개 + 칸 색 변경(요청) ──
// 판정 결과 텍스트 인식(관대한 파서 — 신·구 포맷 모두): "…(사유) — d20=14 (기본 12 +2근력) (기준 13 이상 성공) → 성공"
function diceParse(e){
  if(!e||!e.text||e.orig)return null;
  if(!(e.kind==="ability"||/주사위/.test(e.ability||"")||/주사위/.test(e.cat||"")))return null;
  const t=e.text; if(/\n/.test(t))return null;
  const dm=t.match(/d(\d{1,3})=(\d{1,4})/); const km=t.match(/\(기준\s*(\d+)\s*이상 성공\)/); const om=t.match(/→\s*(\S+)\s*$/);
  if(!dm||!km||!om)return null;
  const reason=t.slice(0,dm.index).replace(/[—–-]\s*$/,"").trim();
  const mods=t.slice(dm.index+dm[0].length,km.index).trim().replace(/^\(/,"").replace(/\)$/,"").trim();
  return {reason,max:+dm[1],roll:+dm[2],mods,dc:+km[1],outcome:om[1]};
}
function diceResClass(outcome){ return /부분/.test(outcome)?"res-part":/성공/.test(outcome)?"res-ok":"res-fail"; }
// 보정 분해: "기본 17 +3근력 -1행운" → {base:17, steps:[{v:3,l:"근력"},{v:-1,l:"행운"}]}.
//  기본(자연굴림)+보정합=최종 이 성립할 때만 단계 연출(불일치·불명이면 보정 없이 최종으로 직행 — 안전).
function diceSteps(mods,finalRoll){
  const bm=(mods||"").match(/기본\s*(-?\d+)/); const base=bm?+bm[1]:finalRoll;
  const steps=[]; const rest=(mods||"").replace(/기본\s*-?\d+/,"");
  const re=/([+\-]\s*\d+)\s*([가-힣A-Za-z]*)/g; let m;
  while((m=re.exec(rest))){ const v=parseInt(m[1].replace(/\s+/g,"")); if(!v)continue; steps.push({v,l:(m[2]||"").trim()}); }
  if(base+steps.reduce((a,s)=>a+s.v,0)!==finalRoll) return {base:finalRoll,steps:[]};
  return {base,steps};
}
function diceStepChip(s){ return `<span class="dstep ${s.v>0?"pos":"neg"}" data-v="${s.v}">${s.v>0?"+":""}${s.v}${s.l?`<i>${esc(s.l)}</i>`:""}</span>`; }
function diceCardHtml(e,d){
  const col=isPerson(e.actor)?colorFor(e.actor):"";
  const who=e.actor?`<span class="who" style="${col?`color:${col}`:""}">${esc(e.actor)}</span>`:"";
  const ds=diceSteps(d.mods,d.roll);
  // 정지/시크(instant)에선 최종값+보정 칩 전부 보이고, 재생 땐 animateDiceCard가 숨겼다 하나씩 공개.
  return `<div class="ev k-dice ${diceResClass(d.outcome)}"><div class="top">${timeHtml(e)}<span class="badge">🎲 주사위</span>${who}`
    +`<span>${esc(d.reason||"행동 판정")}</span><span class="dth">(${d.dc}이상 성공)</span></div>`
    +`<div class="body"><div class="ln">`
    +`d${d.max} = <span class="droll" data-max="${d.max}" data-base="${ds.base}" data-final="${d.roll}">${d.roll}</span>`
    +`<span class="dsteps">${ds.steps.map(diceStepChip).join("")}</span>`
    +`<span class="doutcome"> &gt; ${esc(d.outcome)}!</span></div></div></div>`;
}
// 재생: 결과 숨김 → ★길게 감속 굴림★ → 착지 → 잠시 뜸 → 칸 반짝(flash) → 결과 공개 + 성공=초록/부분=금/실패=자홍 칸 색.
function animateDiceCard(card){
  const roll=card.querySelector(".droll"), out=card.querySelector(".doutcome");
  const steps=[...card.querySelectorAll(".dsteps .dstep")];
  const res=[...card.classList].find(c=>c.indexOf("res-")===0);
  if(res)card.classList.remove(res);
  if(out)out.style.visibility="hidden";
  steps.forEach(s=>s.classList.add("pend")); // 보정 칩 숨김 — 하나씩 공개할 것
  const reveal=()=>{ if(!card.isConnected)return; card.style.animationDuration=(0.6*fxk())+"s"; card.classList.add("flash");
    setTimeout(()=>{ if(!card.isConnected)return; if(res)card.classList.add(res); if(out)out.style.visibility="";
      card.classList.remove("flash"); card.style.animationDuration=""; },600*fxk()); };
  if(!roll){ reveal(); return; }
  roll.classList.add("don");
  const max=Math.max(2,parseInt(roll.dataset.max)||20);
  const fin=roll.dataset.final||roll.textContent; const baseN=parseInt(roll.dataset.base);
  const base=isNaN(baseN)?(parseInt(fin)||0):baseN;
  // ★보정 하나씩 가산★: 굴림이 '기본'에 착지한 뒤, 각 보정을 순차로 공개하며 숫자를 bump(깜빡·튐)로 갱신(요청).
  const applyStep=(i,running)=>{
    if(i>=steps.length){ roll.textContent=fin; roll.classList.add("land"); setTimeout(reveal,200*fxk()); return; }
    setTimeout(()=>{ if(!card.isConnected)return;
      running+=(parseInt(steps[i].dataset.v)||0);
      roll.textContent=running; steps[i].classList.remove("pend");
      roll.classList.remove("bump"); void roll.offsetWidth; roll.classList.add("bump"); // 리플로우로 재트리거
      applyStep(i+1,running);
    },460*fxk());
  };
  // 1) 순수 주사위를 먼저 굴려 '기본'에 착지. 보정이 있으면 착지 강조(land)를 걷고 단계 연출로, 없으면 그대로 최종.
  rollNumber(roll,max,String(base),22,44,240,()=>{
    if(steps.length){ roll.classList.remove("land"); applyStep(0,base); }
    else setTimeout(reveal,180*fxk());
  });
}
// ── ★선택지 카드★: 선택지가 전부 출력된 다음 ❯ 표시와 함께 한 번 반짝여 '골라졌다'가 드러난다(요청) ──
// 신형: "1) A ∥ 2) B ∥ 3) C ⇒ 2) B [최적]" / 구형: "선택 → B [무난]"(목록 없음 — 고른 줄만 반짝)
function choiceParse(e){
  if(!e||!e.text||e.orig)return null;
  if(!/선택지/.test(e.ability||"")&&!/선택지/.test(e.cat||""))return null;
  const t=e.text.replace(/\n/g," ");
  const gm=t.match(/\[(정답|최적|역효과|무난)\]\s*$/); const grade=gm?gm[1]:"";
  const body=gm?t.slice(0,gm.index).trim():t.trim();
  const zm=body.match(/⇒\s*(\d+)\)/);
  if(zm&&/1\)\s/.test(body)){
    const opts=body.slice(0,zm.index).split("∥").map(s=>s.trim()).filter(Boolean);
    return {opts,pick:+zm[1],pickText:body.slice(zm.index+1).replace(/^\s*\d+\)\s*/,"").trim(),grade};
  }
  const sm=body.match(/선택\s*→\s*([\s\S]+)$/);
  if(sm)return {opts:null,pick:1,pickText:sm[1].trim(),grade};
  return null;
}
function choiceGradeClass(g){ return g==="정답"||g==="최적"?"res-ok":g==="역효과"?"res-fail":"res-part"; }
function choiceCardHtml(e,c){
  const col=isPerson(e.actor)?colorFor(e.actor):"";
  const who=e.actor?`<span class="who" style="${col?`color:${col}`:""}">${esc(e.actor)}</span>`:"";
  let body="";
  if(c.opts){ c.opts.forEach((op,i)=>{ const picked=(i+1)===c.pick;
      body+=`<div class="choice-opt${picked?" pick":""}"><span class="cmark">${picked?"❯ ":""}</span>${esc(op)}</div>`; }); }
  else body+=`<div class="choice-opt pick"><span class="cmark">❯ </span>${esc(c.pickText)}</div>`;
  const gcls=choiceGradeClass(c.grade);
  return `<div class="ev k-choice ${gcls}"><div class="top">${timeHtml(e)}<span class="badge">🔀 선택지</span>${who}`
    +`${c.grade?`<span class="cgrade ${gcls}">[${esc(c.grade)}]</span>`:""}</div><div class="body">${body}</div></div>`;
}
// 재생: 선택 표시·등급·칸 색을 숨긴 채 선택지 전부 출력 → ★잠시 뜸 들인 뒤★ 고른 줄에 ❯ + 반짝 + 칸 색 공개(속도 동기화).
function animateChoiceCard(card){
  const res=[...card.classList].find(c=>c.indexOf("res-")===0);
  if(res)card.classList.remove(res);
  const g=card.querySelector(".cgrade"); if(g)g.style.visibility="hidden";
  const picked=card.querySelector(".choice-opt.pick");
  if(picked){ picked.classList.remove("pick"); const mk=picked.querySelector(".cmark"); if(mk)mk.textContent="";
    setTimeout(()=>{ if(!card.isConnected)return;
      picked.style.animationDuration=(0.6*fxk())+"s"; picked.classList.add("pick"); if(mk)mk.textContent="❯ ";
      if(res)card.classList.add(res); if(g)g.style.visibility="";
    },900*fxk()); }
  else { if(res)card.classList.add(res); if(g)g.style.visibility=""; }
}
// ── ★재생 특수효과 디스패처★: 이벤트 종류마다 적절한 연출(요청: 능력 사용 전반에 특수효과) ──
//  주사위=굴림·반짝·색 / 선택지=❯ 반짝 / 능력=보랏빛 파동 / 피해=흔들림·붉게 / 회복=초록 파동 / 아이템=금빛 / 단서=청록 빛.
function playFx(el,e){
  if(!el||!el.classList)return;
  if(el.classList.contains("k-dice")){animateDiceCard(el);return;}
  if(el.classList.contains("k-choice")){animateChoiceCard(el);return;}
  animateDrolls(el); // 서술 속 dN=M 숫자 굴림(범용)
  if(!e)return;
  let cls="";
  if(e.kind==="ability")cls="fx-abil";
  else if(e.kind==="vital"){ const dmg=(e.hpDelta!=null&&e.hpDelta<0)||(e.sanDelta!=null&&e.sanDelta<0); cls=dmg?"fx-hurt":"fx-heal"; }
  else if(e.kind==="item")cls="fx-item";
  else if(e.kind==="clue")cls="fx-clue";
  if(cls){ el.style.animationDuration=(0.85*fxk())+"s"; el.classList.add(cls); } // 특수효과도 재생속도 동기화(요청)
}
// ★인게임 시각을 주 시각으로★(요청: 현실시간 말고 인게임 시간) — gt가 있으면 게임시간을 크게, 실제 시각은 툴팁으로만.
//  gt가 없는 이벤트·구형 로그는 실시간으로 폴백(아예 안 보이는 것 방지).
function timeHtml(e){ return e.gt?`<span class="t" title="실제 시각 ${escAttr(e.t)}">🕐${esc(e.gt)}</span>`
                              :`<span class="t">${esc(e.t)}</span>`; }
function headHtml(e){
  const me=(curVP!=="__all__"&&e.actor===curVP&&(e.kind==="input"||e.kind==="ability"||e.self))?" me":""; // self=입력을 접고 남긴 내 통신도 초록
  // 다른 사람(내가 아닌 인물)의 행동·대사는 우측 정렬(채팅식). GM·시스템 서술은 대상 아님.
  const other=(curVP!=="__all__"&&e.actor&&e.actor!==curVP&&isPerson(e.actor))?" other":"";
  const col=isPerson(e.actor)?colorFor(e.actor):"";
  const who=e.actor?`<span class="who" style="${col?`color:${col}`:""}">${esc(e.actor)}</span>`:"";
  const toStr=e.to.filter(isPerson).length?`<span class="arrow">→ ${esc(e.to.filter(isPerson).join(", "))}</span>`:"";
  const det=e.detail&&e.kind==="ability"?`<span class="badge">${esc(e.detail)}</span>`:"";
  return {cls:"ev k-"+e.kind+me+other+(e.self?" self":""), top:`<div class="top">${timeHtml(e)}<span class="badge">${esc(badgeFor(e))}</span>${det}${who}${toStr}</div>`};
}
// 본문 HTML — 괴담·NPC가 메시지를 변형(변절)했으면 원본/변형됨을 대조해 보여준다.
function bodyHtmlOf(e){
  if(e.orig){
    // ★#216 변조 은폐★: 변조 사실은 당사자에게 숨긴다 — 전지적 '전체 타임라인'(__all__)에서만 원본/변형 대조.
    //   개별 시점에선 발신자=자기가 보낸 원문만, 그 외(수신자 등)=실제로 받은(변형된) 내용만 정상 표시.
    if(curVP==="__all__") return `<div class="ln"><span class="tamper-tag">원본</span><span class="tamper-orig">${esc(e.orig)}</span></div>`
                  + `<div class="ln"><span class="tamper-tag">변형됨</span><span class="tamper-new">${esc(e.text)}</span></div>`;
    return parseBody(e.actor===curVP?e.orig:e.text).map(blockHtml).join("");
  }
  return parseBody(e.text).map(blockHtml).join("");
}
// 짧은 메타 이벤트(아이템·배역·이동·상태)는 헤더 줄에 내용을 ★인라인★으로 붙여 카드 높이를 반으로 —
//  시작소지 10개가 각각 큰 카드로 세로를 잡아먹던 낭비 해소. 단서·서술 등 실내용은 종전대로 본문 줄 유지.
const COMPACT_KINDS=new Set(["item","assign","move","vital"]);
// ★능력 '발동' 이벤트★(결과·주사위·선택지 아님) — 헤더+"발동" 두 줄 대신 한 줄로 깔끔하게(요청).
function abilAct(e){ return e.kind==="ability" && e.phase!=="result" && !diceParse(e) && !choiceParse(e) && !/\n/.test(e.text||""); }
function abilActHtml(e){
  const me=(curVP!=="__all__"&&e.actor===curVP)?" me":"";
  const other=(curVP!=="__all__"&&e.actor&&e.actor!==curVP&&isPerson(e.actor))?" other":"";
  const col=isPerson(e.actor)?colorFor(e.actor):"";
  const who=e.actor?`<span class="who" style="${col?`color:${col}`:""}">${esc(e.actor)}</span>`:"";
  const det=e.detail?`<span class="badge">${esc(e.detail)}</span>`:"";
  const toStr=e.to.filter(isPerson).length?`<span class="arrow">→ ${esc(e.to.filter(isPerson).join(", "))}</span>`:"";
  const t=(e.text||"").trim(); const msg=(!t||t==="발동")?"능력을 발동했습니다":esc(t);
  return `<div class="ev k-ability abil-act${me}${other}"><div class="top">${timeHtml(e)}<span class="badge">✨ ${esc(e.ability||"능력")}</span>${det}${who}${toStr}<span class="act-msg">${msg}</span></div></div>`;
}
// ★#245★ 병합된 서술 카드 상단의 '속마음(생각)' 줄 — 환상체·NPC 생각을 서술과 한 비트로 얹는다(흐린 보라 이탤릭).
function thoughtLineHtml(e){ return e._thought?`<div class="ln thought-inline">💭 <span class="ti-txt">${esc(e._thought)}</span></div>`:""; }
function evHtml(e){
  const dd=diceParse(e); if(dd)return diceCardHtml(e,dd);      // 주사위 → 전용 카드(굴림·반짝·색 공개)
  const cc=choiceParse(e); if(cc)return choiceCardHtml(e,cc);  // 선택지 → 전용 카드(전부 출력 후 ❯ 반짝)
  if(abilAct(e))return abilActHtml(e);                         // 능력 발동 → ★한 줄★(요청)
  const h=headHtml(e); const body=thoughtLineHtml(e)+bodyHtmlOf(e); // 병합된 생각(_thought)이 있으면 본문 맨 위에 속마음 줄
  if(COMPACT_KINDS.has(e.kind)&&e.text&&!e.orig&&!/\n/.test(e.text)){ // 한 줄짜리 메타 → 인라인 컴팩트
    return `<div class="${h.cls} compact">${h.top.slice(0,-6)}<span class="cbody">${esc(e.text)}</span></div></div>`;
  }
  return `<div class="${h.cls}">${h.top}${body?`<div class="body">${body}</div>`:""}</div>`; }
// 개별(현재) 시점 전용: GM 서술에 낀 대사·방송을 별도 칸으로 분리(전체 타임라인은 evHtml 그대로 유지).
function contHead(e){return `<div class="top cont">${timeHtml(e)}<span class="badge">${esc(badgeFor(e))}</span></div>`;}
function evHtmlSplit(e){
  if(e.orig) return evHtml(e); // 변형 대조는 통째로
  if(e._thought) return evHtml(e); // ★#245★ 생각 병합 카드는 쪼개지 말고 한 비트(속마음+서술)로 — evHtml이 상단에 속마음 줄
  const blocks=parseBody(e.text);
  if(!blocks.some(b=>b.type==="say"||b.type==="bc")) return evHtml(e); // 분리할 대사·방송 없으면 그대로
  const h=headHtml(e); const out=[]; let buf=[]; let headUsed=false;
  const flush=()=>{const body=buf.map(blockHtml).join(""); buf=[]; if(!body.replace(/<[^>]+>/g,"").trim())return;
    out.push(`<div class="${h.cls}">${headUsed?contHead(e):h.top}<div class="body">${body}</div></div>`); headUsed=true;};
  for(const b of blocks){
    if(b.type==="say"){ flush(); // ★대사: 화자 이름을 상단(헤더)에 — 입력처럼★
      const col=colorFor(b.name);
      out.push(`<div class="ev k-say split${(curVP!=="__all__"&&b.name!==curVP)?' other':''}"><div class="top">${timeHtml(e)}<span class="badge">💬 대사</span><span class="who" style="color:${col}">${esc(b.name)}</span></div><div class="body"><div class="ln">${esc(b.text)}</div></div></div>`); headUsed=true;
    } else if(b.type==="bc"){ flush();
      out.push(`<div class="ev k-broadcast split"><div class="top">${timeHtml(e)}<span class="badge">📢 방송</span></div><div class="body">${blockHtml(b)}</div></div>`); headUsed=true;
    } else buf.push(b);
  }
  flush();
  return out.join("")||evHtml(e);
}

function badgeFor(e){ return e.kind==="ability"?(e.phase==="result"?"✨ "+(e.ability||"능력")+" 결과":(e.ability?"✨ "+e.ability:"✨ 능력"))
  :e.kind==="vital"?"❤ 상태"
  :e.kind==="move"?"🚶 이동"
  :e.kind==="item"?(e.remove?"🎒 아이템 −":"🎒 아이템"):e.kind==="clue"?"🔍 단서"
  :e.kind==="input"?"입력":e.kind==="call"?("📞 "+(e.via||"통화")):e.kind==="nearby"?"👥 근처":e.kind==="shout"?"📣 외침":e.kind==="letter"?("✉ "+(e.via||"편지")):e.kind==="whisper"?"🤫 귓속말"
  :e.kind==="signal"?("🚩 "+(e.via||"수신호")):e.kind==="psychic"?("🧠 "+(e.via||"정신감응"))
  :e.kind==="gm"?"GM 서술":e.kind==="broadcast"?"📢 방송":e.kind==="npc"?"☎ NPC"
  :e.kind==="thought"?"💭 생각"
  :e.kind==="timeline"?"⏳ 타임라인 사건"
  :e.kind==="assign"?"🎭 배역":e.kind==="system"?"시스템":e.kind==="private"?"개인":e.kind==="gm_input"?"GM입력(상세)":(e.cat||"이벤트"); }
const COMM_KINDS=new Set(["call","nearby","broadcast","shout","letter","whisper","signal","psychic"]);

function filtered(){
  const q=(document.getElementById("q")?.value||"").trim().toLowerCase();
  const onlyAbil=document.getElementById("onlyAbil")?.checked;
  const onlyComm=document.getElementById("onlyComm")?.checked;
  const onlyVital=document.getElementById("onlyVital")?.checked;
  const showVerbose=document.getElementById("verbose")?.checked;
  const out=EVENTS.filter(e=>{
    if(e.hidden)return false; // 통신 카드로 접힌 중복 @입력(요청: 입력·통화 이중 표시 제거)
    if(!visibleTo(e,curVP))return false;
    if(onlyAbil&&e.kind!=="ability")return false;
    if(onlyComm&&!COMM_KINDS.has(e.kind))return false;
    if(onlyVital&&e.kind!=="vital")return false;
    if(!showVerbose&&HIDE_KIND_DEFAULT.has(e.kind))return false;
    if(q){const hay=(e.actor+" "+e.to.join(" ")+" "+e.ability+" "+e.text+" "+(e.orig||"")+" "+(e.item||"")+" "+e.cat).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  // ★#245 생각·서술 병합★: 같은 인물의 💭생각(thought) 바로 뒤에 그 인물의 서술(npc/gm)이 오면 두 카드로
  //  쪼개지 말고 ★한 비트★로 — 서술 카드 위에 '속마음' 줄을 얹는다(환상체 SCP-049처럼 매 비트 생각+서술이
  //  갈라져 보이던 문제). ★이 시점에서 둘 다 보일 때만★ 병합되므로(플레이어 시점엔 생각이 애초에 visibleTo
  //  false라 목록에 없음) 생각이 플레이어 서술로 새지 않는다. 공유 EVENTS를 건드리지 않게 얕은 복제로만 얹는다.
  const merged=[];
  for(let i=0;i<out.length;i++){ const e=out[i], nx=out[i+1];
    if(e.kind==="thought" && nx && (nx.kind==="npc"||nx.kind==="gm") && canon(nx.actor)===canon(e.actor) && e.text){
      merged.push(Object.assign({},nx,{_thought:e.text})); i++; } // 생각을 다음 서술에 얹고 생각 카드는 소비
    else merged.push(e);
  }
  return merged;
}

// ── 채팅 재생: 깜빡임 없이 증분 append + 길이별 가변 속도 + 개별뷰 문단 분할 ──
function buildQueue(){
  const list=filtered(); const q=[]; const individual=curVP!=="__all__";
  for(const e of list){
    const blocks=e.text?parseBody(e.text):[];
    const hasSay=blocks.some(b=>b.type==="say");
    // 개별 뷰 전부 + (전체 뷰라도) 통신·대사 포함 이벤트는 문단(줄)씩 → 대화 타이핑 경로. 주사위·선택지·능력발동은 카드 통째.
    if((individual||isConvoEvent(e)||hasSay) && blocks.length && !diceParse(e) && !choiceParse(e) && !abilAct(e)){
      const real=blocks.filter(b=>b.type!=="br");
      if(real.length){ q.push({e,header:true,block:real[0]});   // ★이름(헤더)+첫 줄을 한 스텝에★ — 따로 뜸들이지 않게(요청)
        for(let i=1;i<real.length;i++) q.push({e,block:real[i]}); }
      else q.push({e,header:true});
    } else q.push({e,whole:true});            // 전체 뷰 비대화·능력발동: 이벤트 단위
  }
  return q;
}
function playBtnOn(on){const b=document.getElementById("playBtn");if(b){b.textContent=on?"⏸ 멈춤":"▶ 재생";b.classList.toggle("on",on);}}
function togglePlay(){
  if(playing){ pausePlay(); return; }
  if(queue.length && qi>0 && qi<queue.length){ playing=true; playBtnOn(true); step(); return; } // ★이어재생★(처음부터 아님)
  startPlay();
}
function startPlay(){
  playing=true; queue=buildQueue(); qi=0; curBodyEl=null;
  const main=document.getElementById("main");
  main.innerHTML=toolbarHtml(filtered())+`<div id="stream"></div>`; bindToolbar();
  if(curVP!=="__all__"){const info=document.getElementById("info");if(info)info.classList.add("open");const tb=document.getElementById("toggleInfo");if(tb)tb.style.display="";}
  step();
}
function pausePlay(){ if(qtimer){clearTimeout(qtimer);qtimer=null;} playing=false; playBtnOn(false); } // 위치 유지(이어재생 가능)
function stopPlay(){ pausePlay(); qi=0; queue=[]; curBodyEl=null; }                                    // 완전 초기화(필터·시점 변경 시)
// 큐 아이템 1개를 스트림에 그린다(instant=true면 애니메이션·스크롤 생략 — 시크 시 즉시 렌더). 길이(읽을 시간)를 반환.
function renderQueueItem(stream,it,instant){
  let len=40;
  if(it.whole){ stream.insertAdjacentHTML("beforeend",evHtml(it.e)); const le=stream.lastElementChild;
    if(!instant)playFx(le,it.e); // 종류별 특수효과(주사위 굴림·선택지 ❯·능력 파동·피해 흔들림 등)
    curBodyEl=null; len=(it.e.text||"").length||40;
    if(le&&(le.classList.contains("k-dice")||le.classList.contains("k-choice")))len=Math.max(len+90,150); } // ★긴 감속 연출★이 다음 이벤트에 덮이지 않게 시간 확보
  else if(it.header){ const h=headHtml(it.e); const d=document.createElement("div"); d.className=h.cls;
    d.innerHTML=h.top+`<div class="body"></div>`; stream.appendChild(d); curBodyEl=d.querySelector(".body");
    if(!instant)playFx(d,it.e);                                            // 특수효과(글로우)는 헤더 카드에
    if(it.block){ appendBlock(curBodyEl,it.block,it.e,instant); len=8+((it.block.text||"").length||20); } else len=8;
  } // 헤더(이름)+첫 줄을 함께 — 대화면 한 글자씩 타이핑(요청)
  else if(it.block){ if(curBodyEl){ appendBlock(curBodyEl,it.block,it.e,instant); } len=(it.block.text||"").length||20; }
  if(!instant) stream.lastElementChild&&stream.lastElementChild.scrollIntoView({block:"end",behavior:"smooth"});
  return len;
}
// 진행 슬라이더 값 동기화(0~1000).
function syncSeek(){ const s=document.getElementById("seek"); if(s&&queue.length) s.value=Math.round(qi/queue.length*1000); }
function step(){
  const stream=document.getElementById("stream"); if(!stream){stopPlay();return;}
  if(qi>=queue.length){ pausePlay(); return; } // 끝 — 상태패널은 마지막 시점으로 남긴다(초기화 X)
  const it=queue[qi++];
  const len=renderQueueItem(stream,it,false);
  if(curVP!=="__all__" && it.e) updateLive(it.e.seq||0); // ★재생 위치에 맞춰 그 플레이어가 '지금' 아는 정보·상태만★
  const cnt=document.getElementById("cnt"); if(cnt)cnt.textContent=qi+"/"+queue.length;
  syncSeek();
  const delay=Math.max(260,(360+len*24)/speed);   // 길수록 더 오래(읽을 시간)
  qtimer=setTimeout(step,delay);
}
// ★중간부터 재생(#184)★: 슬라이더 비율(0~1)로 그 지점까지 즉시 그려두고, 이후 ▶면 그 지점부터 이어재생.
function seekTo(frac){
  pausePlay();
  const list=filtered(); if(!list.length)return;
  if(!queue.length) queue=buildQueue();
  const qTarget=Math.max(0,Math.min(queue.length,Math.round(frac*queue.length)));
  const stream=document.getElementById("stream"); if(!stream)return;
  stream.innerHTML=""; curBodyEl=null; let lastE=null;
  for(let i=0;i<qTarget;i++){ renderQueueItem(stream,queue[i],true); if(queue[i].e)lastE=queue[i].e; }
  qi=qTarget;
  if(curVP!=="__all__" && lastE) updateLive(lastE.seq||0);
  const cnt=document.getElementById("cnt"); if(cnt)cnt.textContent=qi+"/"+queue.length;
  stream.lastElementChild&&stream.lastElementChild.scrollIntoView({block:"end"});
}
// 표시명 "이름(직업)" — buildAlias의 uni와 동일 규칙(상태 계산에서 replay 플레이어 매칭용).
function uniName(nm,jb){nm=(nm||"").trim();jb=(jb||"").trim();return (nm&&jb)?nm+"("+jb+")":(nm||jb);}
// 특정 시점(seq) 기준, 그 플레이어가 '지금까지' 아는 상태를 접어서 계산(체력·정신·능력발동수·단서·아이템).
function stateAt(vp,seq){
  let hp=null,hpMax=null,san=null,sanMax=null,abil=0,loc=null; const items=[],clues=[]; const itemMeta={}; const usedByName={}; const visited=new Set();
  const rp=((REPLAY&&REPLAY.players)||[]).find(p=>uniName(p.charName,p.job)===vp||p.charName===vp||canon(p.charName)===vp);
  if(rp){ if(Array.isArray(rp.hp)){hp=rp.hp[0];hpMax=rp.hp[1];} if(Array.isArray(rp.san)){san=rp.san[0];sanMax=rp.san[1];} if(rp.zone){loc=String(rp.zone).trim();if(loc)visited.add(loc);} } // 시작 위치 시드(있으면)
  for(const e of EVENTS){ if((e.seq||0)>seq)break;
    const mine=e.actor===vp, tome=e.to&&e.to.includes(vp);
    if(e.kind==="vital"&&mine){ if(e.hpAfter!=null){hp=e.hpAfter;hpMax=e.hpMax;} if(e.sanAfter!=null){san=e.sanAfter;sanMax=e.sanMax;} }
    else if(e.kind==="ability"&&mine&&e.phase!=="result"){abil++; if(e.ability)usedByName[e.ability]=(usedByName[e.ability]||0)+1;} // 능력별 사용횟수 집계
    else if(e.kind==="item"&&(mine||tome)){ // 획득은 추가, 제거(remove)는 목록에서 뺀다 — 부가표기 '(…)'는 이름 매칭 위해 벗긴다
      const raw=(e.item||e.text||"아이템").replace(/^→\S+\s*/,"");
      const nm=raw.replace(/\s+\([^)]*\)\s*$/,"").trim();
      if(e.remove){ const i=items.lastIndexOf(nm); if(i>=0)items.splice(i,1); }
      else if(nm){ items.push(nm);

  //  입력은 숨기고 수신자 표기가 있는 통신 카드 하나만 남긴다. 그 통신 카드는 '내 입력' 표시(self=초록)를 물려받는다.

  }

// 로그에서 괴담(시나리오) 이름 파싱 — 세션 이벤트의 title 필드(JSONL) 또는 '괴담: X' 라인(.txt)
function parseScenarioTitle(text){
  const m=(text||"").match(/"title"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  if(m){try{return JSON.parse('"'+m[1]+'"');}catch(_){return m[1];}}
  const t=(text||"").match(/괴담:\s*([^\n"]+)/);
  return t?t[1].trim():"";
}
// ── .gdam 복호화 (AES-256-GCM · 모든 설치 공유 고정키) ──
// 게임과 동일: key = SHA-256("AiByMinecraft::gdam::shared-scenario-key::v1"),
// 파일 = "seed\n<base64(IV[12]+ciphertext+GCM태그[16])>". 시나리오 공유용 고정키라 뷰어도 그대로 복호화 가능.
const GDAM_KEYSTR="AiByMinecraft::gdam::shared-scenario-key::v1";
let _gdamKey=null;
function gdamKey(){
  if(!_gdamKey){const data=new TextEncoder().encode(GDAM_KEYSTR);
    _gdamKey=crypto.subtle.digest("SHA-256",data).then(h=>crypto.subtle.importKey("raw",h,{name:"AES-GCM"},false,["decrypt"]))
      .catch(e=>{_gdamKey=null;throw e;});} // 실패한 프로미스를 캐시하지 않음(다음 시도 재생성)
  return _gdamKey;
}
function b64ToBytes(b64){const s=atob(String(b64).trim());const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function decryptGdamText(text){
  const t=(text||"").trim(); if(!t)return null;
  if(t.startsWith("{"))return JSON.parse(t); // ② 평문 .gdam(사용자 작성) — 복호화 없이 파싱
  const lines=t.split(/\r?\n/); if(lines.length<2)return null; // ① 암호화 .gdam — 둘째 줄 base64
  if(!(window.crypto&&crypto.subtle))throw new Error("이 브라우저/컨텍스트에서 복호화(SubtleCrypto) 불가");
  const combined=b64ToBytes(lines[1]),iv=combined.slice(0,12),ct=combined.slice(12);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv,tagLength:128},await gdamKey(),ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
function decryptGdamFile(file){return file.text().then(decryptGdamText);}
function gdamTitleOf(j){return (j&&j.entity&&j.entity.name)?String(j.entity.name):"";}
// 폴더 로그 각각의 괴담 이름 확정: 씨드 매칭 .gdam 복호화 우선 → 실패 시 로그 텍스트('괴담: X'/title)에서 파싱
async function resolveFolderTitles(){
  const gd=[];
  for(const g of (FILES.gdams||[])){
    try{const nm=gdamTitleOf(await decryptGdamFile(g)); if(nm)gd.push({name:g.name,title:nm});}catch(_){}
  }
  for(const f of FILES.logs){
    let title="";
    const g=gd.find(x=>seedMatch(x.name,f.name)); if(g)title=g.title;
    if(!title){try{title=parseScenarioTitle(await f.slice(0,8192).text());}catch(_){}}
    f.__title=title;
  }
}
function loadLogText(name,text){
  const looksJson=/\.jsonl?$/i.test(name)||/^\s*\{/.test(text);

  RAWCACHE=raw; buildAlias(); rebuild(raw);

// ── 정보 패널 섹션 접기 ── 헤더(h3.sech) 클릭 → 다음 h3.sech 전까지의 형제 요소를 접는다.

function sh(id,title){ return `<h3 class="sech" data-sid="${id}" onclick="toggleSec(this)"><span class="secarrow">▾</span> ${title}</h3>`; }
function applyCollapsed(){

function chipList(gid, entries){

function pickChip(gid, idx, el){

function scNameOf(rid){

// 관계도 SVG — 인물 노드를 원형 배치하고 관계를 선+라벨로 잇는다.
function scRelSvg(rels){
  const ids=[]; for(const rr of rels) for(const rid of (rr.roles||[])) if(rid&&!ids.includes(rid)) ids.push(rid);
  if(ids.length<2) return "";
  // 관계 '유형'별로 선 색을 배정하고, 유형 라벨은 선 위(겹침)가 아니라 아래 범례로 뺀다.
  const PAL=["#7fb2ff","#ff9a8f","#8fe0a8","#ffd479","#c9a0ff","#7fe0d8","#ff9ecb","#b7c47f"];
  const typeColor={}; let ci=0;
  for(const rr of rels){const t=(rr.type||"기타"); if(!(t in typeColor)){typeColor[t]=PAL[ci%PAL.length];ci++;}}
  const W=320, H=Math.max(240,90+ids.length*30), cx=W/2, cy=H/2-4, R=Math.min(cx,cy)-56;
  const pos={}; ids.forEach((id,i)=>{const a=-Math.PI/2+2*Math.PI*i/ids.length; pos[id]=[cx+R*Math.cos(a), cy+R*Math.sin(a)];});
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="background:var(--panel2);border:1px solid var(--line);border-radius:8px;margin-bottom:4px">`;
  for(const rr of rels){const rs=rr.roles||[]; if(rs.length<2)continue; const a=pos[rs[0]],b2=pos[rs[1]]; if(!a||!b2)continue;
    s+=`<line x1="${a[0].toFixed(0)}" y1="${a[1].toFixed(0)}" x2="${b2[0].toFixed(0)}" y2="${b2[1].toFixed(0)}" stroke="${typeColor[rr.type||"기타"]}" stroke-width="2" opacity="0.85"/>`;
  }
  for(const id of ids){const p=pos[id], nm=scNameOf(id);
    s+=`<circle cx="${p[0].toFixed(0)}" cy="${p[1].toFixed(0)}" r="6" fill="${colorFor(nm)}" stroke="#1a1d26" stroke-width="1.5"/>`;
    // 노드 라벨: 위쪽 반원은 노드 위, 아래쪽 반원은 노드 아래에 둬 중앙 겹침을 완화.
    const ly=(p[1]>cy)?p[1]+15:p[1]-10;
    s+=`<text x="${p[0].toFixed(0)}" y="${ly.toFixed(0)}" fill="#e7e9ee" font-size="10" text-anchor="middle">${esc(nm)}</text>`;
  }
  s+=`</svg>`;
  // 색별 관계 범례(선 색 = 관계 유형)
  let leg=`<div style="display:flex;flex-wrap:wrap;gap:5px 12px;margin:0 0 6px;font-size:11px">`;
  for(const t in typeColor)
    leg+=`<span style="white-space:nowrap"><span style="display:inline-block;width:11px;height:3px;border-radius:2px;background:${typeColor[t]};margin-right:5px;vertical-align:middle"></span>${esc(t.replace(/_/g," "))}</span>`;
  leg+=`</div>`;
  return s+leg;
}

function isCommDeadZone(z){

}
function areaTint(a){ if(!a)return "#2a2450"; let h=0; for(let i=0;i<a.length;i++)h=(h*31+a.charCodeAt(i))>>>0; return `hsl(${h%360},36%,25%)`; }

function connTargets(z){

    if(typeof c==="string") out.push({to:c,dist:null});
    else if(c&&typeof c==="object"){ const to=c.to||c.zone||c.zone_id||c.id; if(to)out.push({to,dist:(c.dist!=null?c.dist:c.distance!=null?c.distance:c.time!=null?c.time:c.minutes!=null?c.minutes:null)}); }

}

        if(vert){ const ny=Math.max(b.y+7,Math.min(b.y+b.h-7,b.cy+off)); P[ei][1]=ny; P[bend][1]=ny; }   // 좌/우 변: 문·직전꺾임 Y 함께
        else    { const nx=Math.max(b.x+7,Math.min(b.x+b.w-7,b.cx+off)); P[ei][0]=nx; P[bend][0]=nx; } }); } // 상/하 변: X 함께
  })();
  // ── 2.7) ★교차 통로 강조★: 통로가 다른 통로를 가로지르면(십자로 통과) 그 통로 속을 ★연한 회색★으로
  //    채운다 → 교차점에서 위로 지나가는 통로가 아래 통로를 확실히 덮어 위/아래가 또렷이 보인다.
  //    안 겹치는(가로지르지 않는) 통로는 속 빈(중립) 그대로 두어 지도가 알록달록해지지 않게 한다. ──
  (function markCrossings(){
    const seg=P=>{const s=[];for(let i=0;i+1<P.length;i++)s.push([P[i],P[i+1]]);return s;};
    const cross=(A,B)=>{ for(const [a1,a2] of seg(A))for(const [b1,b2] of seg(B)){
      const aH=Math.abs(a1[1]-a2[1])<1, bH=Math.abs(b1[1]-b2[1])<1; if(aH===bH)continue;   // 같은 방향은 교차 아님
      const H=aH?[a1,a2]:[b1,b2], V=aH?[b1,b2]:[a1,a2];
      const hy=H[0][1], hx0=Math.min(H[0][0],H[1][0]), hx1=Math.max(H[0][0],H[1][0]);
      const vx=V[0][0], vy0=Math.min(V[0][1],V[1][1]), vy1=Math.max(V[0][1],V[1][1]);
      if(vx>hx0+1&&vx<hx1-1&&hy>vy0+1&&hy<vy1-1)return true; } return false; };   // 끝점 접합(문)은 제외, 내부 교차만
    for(let i=0;i<EG.length;i++)for(let j=i+1;j<EG.length;j++)   // i<j → j가 나중에 그려짐=위로 지나감(over), i=아래(under)
      if(cross(EG[i].pts,EG[j].pts)){ EG[i]._under=true; EG[j]._over=true; }
  })();
  // ── 3) 복도 렌더 + ★거리 라벨 충돌 회피★(겹치면 위/아래로 살짝 밀어 '4분/5분' 겹침 방지) ──
  const placedLab=[]; const lolap=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
  for(const g of EG){ const P=g.pts;
    const d=P.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join('');
    // ★밑에 깔리는(under) 통로만 연한 회색으로 채운다★ — 위로 지나가는(over/제일 위) 통로는 이미
    //   또렷하니 색 없이 속 빈 중립 그대로. 색을 줄여 지도가 덜 번잡하게.
    const inner=(!know&&g._under)?'#8b95ac':holl;
    // ★over 통로 케이싱★: 배경색 테두리(16px)를 먼저 깔면 나중에 그려지는 이 통로가 아래 통로에 살짝
    //   틈을 내며 지나가 '누가 위로 가로지르는지'가 또렷이 보인다(지하철 노선도식 라인점프).
    if(!know&&g._over) corr+=`<path d="${d}" stroke="${holl}" stroke-width="16" fill="none" stroke-linejoin="miter" stroke-linecap="butt"/>`;
    corr+=`<path d="${d}" stroke="${wallC}" stroke-width="12" fill="none" stroke-linejoin="miter" stroke-linecap="butt"/>`
        +`<path d="${d}" stroke="${inner}" stroke-width="8" fill="none" stroke-linejoin="miter" stroke-linecap="butt"/>`;
    const dl=distLabel(g.dist); if(!dl)continue;
    // 라벨 기준점: 가장 긴 구간의 중점(분리로 꺾임점이 이동했을 수 있어 pts에서 다시 계산)
    let bi=0,bl=-1; for(let i=0;i+1<P.length;i++){const L=Math.abs(P[i][0]-P[i+1][0])+Math.abs(P[i][1]-P[i+1][1]); if(L>bl){bl=L;bi=i;}}
    let lx=(P[bi][0]+P[bi+1][0])/2, ly=(P[bi][1]+P[bi+1][1])/2+3;
    const lw=String(dl).length*8+4, lh=12;
    for(let k=0;k<7;k++){ const bx={x:lx-lw/2,y:ly-lh+2,w:lw,h:lh}; if(!placedLab.some(Q=>lolap(bx,Q)))break; ly+= (k%2?-1:1)*(k+1)*7; }
    placedLab.push({x:lx-lw/2,y:ly-lh+2,w:lw,h:lh});
    dists+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" font-size="9" fill="#cfd6ea" style="paint-order:stroke" stroke="#0f1424" stroke-width="3">${esc(dl)}</text>`;
  }
  // ── 대분류 범례(하단): 색=건물/구획 ──
  let legendSvg="";
  if(areasUsed.length>1){ let lx=PAD; const ly=H-6;
    for(const a of areasUsed){ legendSvg+=`<rect x="${lx}" y="${ly-8}" width="9" height="9" fill="${areaTint(a)}" fill-opacity="0.8" stroke="#c6d0e6" stroke-width="0.7"/>`
      +`<text x="${lx+13}" y="${ly}" font-size="9.5" fill="#aab3cf">${esc(a)}</text>`; lx+=13+Math.round(estW(a)*0.73)+18; } }
  const title=know?'미니맵 — 아는 구역만':'구역 지도(설계도)';
  const foot=know?'▶흰색=현재 · 밝음=주변 · 어두움=다녀온 곳 · 초록 통로=이동 가능(모르는 곳은 숨김)':'통로=연결(안 숫자=소요 시간) · 교차 시 밑에 깔리는 통로만 연회색 · 📵=통신 불가 · 방 색=대분류(하단 범례)';
  return `<div class="zmap" style="overflow:auto;margin-bottom:6px;cursor:zoom-in" onclick="mapZoom(this)" title="클릭하면 크게 보기">`
    +`<div class="dim2" style="margin-bottom:3px">${title} <span style="background:#2a2450;border:1px solid #4a3f80;border-radius:6px;padding:0 7px;color:#cabfff">🔍 크게 보기</span></div>`
    +`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-height:400px;min-width:${Math.min(W,320)}px">${bg}${rects}${corr}${dists}${labels}${legendSvg}</svg>`
    +`<div class="dim2">${foot}</div></div>`;
}
// 지도 클릭 → 전체화면 오버레이로 ★크게★ 보기(스크롤 가능). 아무 곳이나 누르면 닫힘. (뷰어 맵이 작다는 피드백)
function mapZoom(el){
  const svg=el&&el.querySelector&&el.querySelector('svg'); if(!svg)return;
  const vb=(svg.getAttribute('viewBox')||'').split(/\s+/), w=+vb[2]||800, h=+vb[3]||600;
  const scale=Math.min(3,Math.max(1.7,1000/w));
  let ov=document.getElementById('mapzoom');
  if(!ov){ ov=document.createElement('div'); ov.id='mapzoom';
    ov.style.cssText='position:fixed;inset:0;background:rgba(8,6,20,.93);z-index:99999;display:flex;align-items:center;justify-content:center;padding:18px;cursor:zoom-out';
    ov.onclick=function(){ ov.style.display='none'; }; document.body.appendChild(ov); }
  ov.innerHTML='<div style="max-width:96vw;max-height:93vh;overflow:auto;background:#141024;border:1px solid #4a3f80;border-radius:10px;padding:12px">'
    +'<svg viewBox="0 0 '+w+' '+h+'" width="'+Math.round(w*scale)+'" height="'+Math.round(h*scale)+'">'+svg.innerHTML+'</svg>'
    +'<div style="text-align:center;color:#9b8fd6;font-size:11px;margin-top:6px">아무 곳이나 눌러 닫기</div></div>';
  ov.style.display='flex';
}

function ingestAll(fl){const files=[...fl];const meta=files.filter(f=>/\.(replay|json|gdam)$/i.test(f.name));const logs=files.filter(f=>/\.(jsonl|txt)$/i.test(f.name));

  Promise.all(meta.map(ingest)).then(()=>{const log=logs.find(f=>/\.jsonl$/i.test(f.name))||logs[0];if(log)ingest(log);});}
// ★폴더 누적★: logs·replays·gdam이 서로 다른 폴더면, 각 폴더를 차례로 열어도 합쳐진다(초기화하지 않고 병합).
//  logs 폴더를 먼저 열고 → replays 폴더를 열면 이미 보던 로그가 이름·스탯까지 갖춰 다시 렌더된다.
function ingestFolder(fl){
  if(!FILES||!FILES.logs)FILES={logs:[],replays:[],scenarios:[],gdams:[]};
  const add=(arr,f)=>{ if(!arr.some(x=>x.name===f.name&&x.size===f.size))arr.push(f); };
  for(const f of fl){if(/\.(jsonl|txt)$/i.test(f.name))add(FILES.logs,f);else if(/\.replay$/i.test(f.name))add(FILES.replays,f);else if(/\.gdam$/i.test(f.name))add(FILES.gdams,f);else if(/\.json$/i.test(f.name))add(FILES.scenarios,f);}
  FILES.logs.sort((a,b)=>((b.lastModified||0)-(a.lastModified||0))||b.name.localeCompare(a.name)); // 최근 생성이 위(시간 desc, 동률이면 이름 역순)
  // ★같은 세션 중복 제거★: 같은 씨드#회차의 .txt 와 .events.jsonl 이 모두 있으면 목록엔 .events.jsonl(더 풍부) 하나만 — '파일 두 개로 뜨는' 문제 해소.
  {const baseOf=n=>n.replace(/\.events\.jsonl$/i,"").replace(/\.jsonl$/i,"").replace(/\.txt$/i,"");
   const jsonlBases=new Set(FILES.logs.filter(f=>/\.jsonl$/i.test(f.name)).map(f=>baseOf(f.name)));
   FILES.logs=FILES.logs.filter(f=>!(/\.txt$/i.test(f.name)&&jsonlBases.has(baseOf(f.name))));}
  if(!FILES.logs.length){document.getElementById("meta").textContent="이 폴더엔 로그가 없습니다 — 먼저 logs 폴더를 여세요(replays·gdam은 이어서 열면 자동 결합).";resolveFolderTitles().then(renderSide);return;}
  const cur=FILES.logs.find(f=>f.__on)||FILES.logs.find(f=>/\.events\.jsonl$/i.test(f.name))||FILES.logs[0];
  openFolderLog(cur); // 보던 로그 유지 — 새로 합쳐진 replay/gdam을 반영해 다시 연다
  resolveFolderTitles().then(renderSide); // 파일 목록에 괴담 이름 표시(.gdam 복호화 우선)
}
// ★자동 탐색·결합★: 폴더 하나(상위 폴더 권장 — logs·replays·gdam을 품은 폴더)만 권한을 주면
//  하위 logs/replays/gdam을 ★재귀 순회★해 관련 파일을 모두 찾아 씨드로 자동 결합한다.
//  (브라우저 보안상 '파일 하나'만으로는 형제 폴더로 올라갈 수 없어, 폴더 권한 1회가 필요하다.)
// 최근 폴더 기억(IndexedDB) — 뷰어(logs/viewer.html)를 다시 열면 지난번 폴더를 기본으로 복원.
//  브라우저 보안상 html 자신의 경로를 직접 지정할 순 없으나, 한 번 고른 폴더를 저장·재사용해 사실상 기본 경로가 되게 한다.
const DIRDB="trpg-viewer", DIRKEY="lastDir";
function idbGet(){return new Promise(res=>{try{const r=indexedDB.open(DIRDB,1);
  r.onupgradeneeded=()=>{try{r.result.createObjectStore("h");}catch(_){}};
  r.onsuccess=()=>{try{const g=r.result.transaction("h","readonly").objectStore("h").get(DIRKEY);
    g.onsuccess=()=>res(g.result||null); g.onerror=()=>res(null);}catch(_){res(null);}};
  r.onerror=()=>res(null);}catch(_){res(null);}});}
function idbSet(h){try{const r=indexedDB.open(DIRDB,1);
  r.onupgradeneeded=()=>{try{r.result.createObjectStore("h");}catch(_){}};
  r.onsuccess=()=>{try{r.result.transaction("h","readwrite").objectStore("h").put(h,DIRKEY);}catch(_){}};}catch(_){}}

async function discoverFromHandle(root){
  document.getElementById("meta").textContent="자동 탐색 중…";
  const files=[];
  async function walk(dir,depth){
    if(depth>5) return; // 폭주 방지(깊이 제한)
    try{ for await (const entry of dir.values()){
      if(entry.kind==="file"){ if(/\.(jsonl|txt|replay|json|gdam)$/i.test(entry.name)){ try{ files.push(await entry.getFile()); }catch(_){} } }
      else if(entry.kind==="directory"){ await walk(entry,depth+1); }
    } }catch(_){}
  }
  await walk(root,0);
  if(!files.length){ document.getElementById("meta").textContent="선택한 폴더에서 로그/리플레이/시나리오를 찾지 못했습니다(상위 폴더를 선택했는지 확인)."; return; }
  ingestFolder(files); // 기존 누적·씨드 매칭 흐름 재사용(logs·replays·gdam 자동 결합)
}

// 씨드 정규화(핵심): 로그·리플레이·gdam이 ★서로 다른 폴더·다른 파일명 규칙★이어도 같은 게임으로 묶이게 한다.
//  로그 "<seed>#<run>.txt" / 리플레이 "S<stage>_<seed>_<hexT시각>.replay" / gdam "<seed>.gdam" → 공통 영숫자 코어로 축약.
function seedKey(n){
  let s=(n||"").replace(/\.(events\.)?(jsonl|txt|json|replay|gdam)$/i,""); // 확장자
  s=s.replace(/^S\d+_/i,"");             // 리플레이 스테이지 접두 S3_
  s=s.replace(/_[0-9A-Za-z]+T\d+$/,"");  // 리플레이 날짜·시각 접미 _3FA16T2026
  s=s.replace(/[#_]\d+$/,"");            // 실행 회차 #1 / _1
  return s.replace(/[^A-Za-z0-9]/g,"").toUpperCase(); // 영숫자 코어(대문자)
}
// 두 파일이 같은 게임인지: 코어 일치 또는 포함(회차 '#' 유실 등 변형 흡수).
function seedMatch(a,b){a=seedKey(a);b=seedKey(b);return !!a&&!!b&&(a===b||a.includes(b)||b.includes(a));}
function openFolderLog(f){FILES.logs.forEach(x=>x.__on=false);f.__on=true;REPLAY=null;SCENARIO=null;
  const rep=FILES.replays.find(x=>seedMatch(x.name,f.name)),sc=FILES.scenarios.find(x=>seedMatch(x.name,f.name));
  const gd=(FILES.gdams||[]).find(x=>seedMatch(x.name,f.name));const jobs=[];
  if(rep)jobs.push(rep.text().then(t=>{try{REPLAY=JSON.parse(t);}catch(_){}}));
  if(sc)jobs.push(sc.text().then(t=>{try{const j=JSON.parse(t);if(j.entity||j.world_rules||j.npcs)SCENARIO=j;else if(j.players&&!REPLAY)REPLAY=j;}catch(_){}}));
  else if(gd)jobs.push(decryptGdamFile(gd).then(j=>{if(j&&(j.entity||j.world_rules||j.npcs))SCENARIO=j;}).catch(()=>{})); // .json 없으면 원본 .gdam 복호화로 시나리오 표시
  Promise.all(jobs).then(()=>f.text()).then(t=>{loadLogText(f.name,t);renderInfo();});}

async function liveTick(){ try{

  const file=await findFileInDir(h,cur.name); if(!file) return;
  const t=await file.text(); if(t.length===LIVE_LEN) return;      // 변화 없으면 스킵
  LIVE_LEN=t.length;
  const vp=curVP;                                                 // 시점 유지(rebuild가 curVP를 __all__로 리셋하므로 저장·복원)
  loadLogText(cur.name,t);
  if(vp&&vp!=="__all__"&&VIEWPOINTS.some(v=>(v.name||v)===vp)){ curVP=vp; renderSide(); renderMain(); }
  renderInfo(); scrollBottom();
}catch(_){}}
document.getElementById("live").onclick=function(){
  const btn=this;
  if(LIVE){ clearInterval(LIVE); LIVE=null; btn.textContent="🔴 실시간"; btn.classList.remove("liveon"); return; }
  if(!window.showDirectoryPicker){ alert("이 브라우저는 실시간 감시 미지원 — 크롬 계열에서 '🔍 자동 탐색·결합'으로 폴더를 여세요."); return; }
  idbGet().then(h=>{ if(!h){ alert("먼저 '🔍 자동 탐색·결합'으로 폴더를 열면 실시간 감시가 됩니다(파일 갱신을 자동 감지)."); return; }
    LIVE_LEN=-1; LIVE=setInterval(liveTick,2000); btn.textContent="🟢 실시간 ON"; btn.classList.add("liveon"); liveTick(); });
};
// 시나리오/정보창 좌우 드래그로 너비 조절 — 글씨 크기(--ifs)도 폭에 비례해 커진다(기준 340px=1.0).
(function(){ const info=document.getElementById("info"), rz=document.getElementById("infoResize"); if(!info||!rz)return; let drag=false;
  const applyW=w=>{ w=Math.max(300,Math.min(960,w)); info.style.width=w+"px"; info.style.setProperty("--ifs",(w/340).toFixed(3)); };
  rz.addEventListener("mousedown",e=>{drag=true;e.preventDefault();document.body.style.userSelect="none";});
  window.addEventListener("mousemove",e=>{ if(drag)applyW(window.innerWidth-e.clientX); });
  window.addEventListener("mouseup",()=>{ if(drag){drag=false;document.body.style.userSelect="";} });
})();
fileEl.onchange=e=>{if(e.target.files.length)ingestAll(e.target.files);};
dirEl.onchange=e=>{if(e.target.files.length)ingestFolder(e.target.files);};
const drop=document.getElementById("drop");
["dragenter","dragover"].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
["dragleave","drop"].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();if(ev==="dragleave"&&e.relatedTarget)return;drop.classList.remove("drag");}));
document.addEventListener("drop",e=>{const fs=e.dataTransfer?.files;if(fs&&fs.length)ingestAll(fs);});
// ★뷰어 폴더 자동 로드(요청)★: 뷰어가 들어있는 폴더(logs/)의 manifest.json을 페치해 ★최신 판을 자동으로★ 연다.
//  플러그인이 서버 시작·세션마다 manifest.json을 갱신한다(logs 목록 + ../gdam·../replays 상대경로).
//  로컬 서버·파이어폭스 file://에선 즉시 동작. 크롬 더블클릭 file://은 보안상 fetch가 막혀 실패 →
//  아래 tryRestoreLastDir(최근 폴더 복원) → 파일/폴더 선택 버튼으로 자연스럽게 폴백한다.
async function tryManifestAutoLoad(){
  let m; try{ const r=await fetch('manifest.json',{cache:'no-store'}); if(!r.ok) return false; m=await r.json(); }catch(_){ return false; }
  const rel=[...(m&&m.logs||[]),...(m&&m.gdams||[]),...(m&&m.replays||[])];
  if(!rel.length) return false;
  const files=[]; let idx=0;
  for(const p of rel){ try{ const r=await fetch(p,{cache:'no-store'}); if(r.ok){ const b=await r.blob(); files.push(new File([b],(p.split('/').pop()||p),{lastModified:Date.now()-(idx++)})); } }catch(_){} }
  if(!files.length) return false;
  if(!FILES||!FILES.logs)FILES={logs:[],replays:[],scenarios:[],gdams:[]};
  ingestFolder(files); // 기존 폴더 결합 흐름 재사용(씨드로 로그+gdam+replay 자동 매칭, 최신 로그 자동 오픈)
  return true;
}
tryManifestAutoLoad().then(ok=>{ if(!ok) tryRestoreLastDir(); }); // 자동 로드 실패 시 최근폴더 복원/파일 선택으로 폴백
</script>

name: AIByMinecraft
main: heipsys.AICraft
version: 1.0
api-version: 1.21
description: "heIp12 games"
commands:
  trpg:
    description: "TRPG 시스템 커맨드"
    usage: "/trpg <start|stop|status|retry|help>"
    # ★기본 권한 제한 없음(전체 사용 가능)★ — 유저용 서브커맨드(me·map·이동·log·info·trait·ending·추천·status·list 등)는
    #   OP 없이 써야 하므로 커맨드 자체엔 permission을 두지 않는다. 관리·진행 계열(start·setting·stop·retry·next·resume·
    #   load·reserve·replay·givetrait·jobrefresh)은 CMDTrpg가 서브커맨드별 isOp() 검사로 개별 보호한다.
  r:
    description: "설정(config.yml) 리로드"
    usage: "/r"
    permission: op
  gdam:
    description: "AI 설정 실시간 리로드/키 순환 (세션 유지)"
    usage: "/gdam <reload|key|status>"
    permission: op

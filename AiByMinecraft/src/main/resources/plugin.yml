name: AIByMinecraft
main: heipsys.AICraft
version: 1.0
api-version: 1.21
description: "heIp12 games"
commands:
  trpg:
    description: "TRPG 시스템 커맨드"
    usage: "/trpg <start|stop|status|retry|help>"
    permission: op
  join:
    description: "진행 중인 TRPG 세션 참여"
    usage: "/join"
  r:
    description: "설정(config.yml) 리로드"
    usage: "/r"
    permission: op
  gdam:
    description: "AI 설정 실시간 리로드/키 순환 (세션 유지)"
    usage: "/gdam <reload|key|status>"
    permission: op

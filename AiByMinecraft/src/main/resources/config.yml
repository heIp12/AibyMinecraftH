# OpenAI API Key 설정
# 발급받은 API 키를 아래에 입력해 주세요.
# openai(짧고 빠름) / gemini(상상력이 풍부하지만 느림) / claude(비싸지만 똑똑함)
api-type: "openai"
api-key:

# [TRPG] AI 모델 설정
# 비워두면 자동(auto). claude는 API 키만 넣으면 ★각 등급(opus/sonnet/haiku)의 최신 모델을 자동 탐지★해 사용합니다.
# (자동 탐지는 api-type=claude일 때만. openai/gemini는 아래 등급 기본값/오버라이드를 사용.)
# 게임 시작 시 저품질/중품질/고품질을 고르면 각각 haiku/sonnet/opus 등급이 적용됩니다.
models:
  # API에서 최신 모델 자동 탐지 (claude 전용). false면 아래 값/하드코딩 기본만 사용.
  auto-latest: true
  # 등급별 모델 (비우면 자동 탐지 → 하드코딩 폴백). 정확한 모델 ID로 직접 지정해도 됩니다.
  high: ""      # 고품질 (기본 Opus 최신)
  medium: ""    # 중품질 (기본 Sonnet 최신)
  low: ""       # 저품질 (기본 Haiku 최신)
  # 역할별 세부 모델 (비우면 위 등급을 따름). 특정 역할만 다른 모델로 돌리고 싶을 때만 지정.
  gm: ""        # 게임 마스터(서술·판정) — 비우면 선택한 품질 등급
  entity: ""    # 괴담(공포 존재) AI
  npc: ""       # NPC AI (서브 NPC 포함)
  assistant: "" # 특성·데이터 보조 처리 AI
  gdam: ""      # 시나리오(.gdam) 생성 — 비우면 최소 Sonnet(고품질 선택 시 Opus)
  # ── 속도(effort) ── Opus 4.8 등 적응형 thinking 깊이를 조절해 속도/품질을 바꿉니다.
  #   값: low < medium < high < xhigh < max (비우면 모델 기본). 낮출수록 thinking 토큰이 줄어 빨라집니다(대신 품질↓).
  #   예: 시나리오 생성이 느리면 effort-gdam: "medium"(또는 "low")로. 창의성이 중요하면 비워두거나 high.
  effort-gdam: ""      # 시나리오(.gdam) 생성 속도 — 느리면 medium/low 권장
  effort-gm: ""        # GM 서술·판정(매 턴) 응답 속도
  effort-npc: ""       # NPC·괴담 AI 응답 속도
  effort-assistant: "" # 보조 처리 속도
# [TRPG 괴담] 게임 설정

trpg:
  # NPC 욕설·비속어 허용 여부 (기본 false = 순화된 표현만). /trpg setting 다이얼로그의 'NPC 욕설' 버튼으로도 토글됩니다.
  swear-allowed: false
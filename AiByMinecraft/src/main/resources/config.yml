      "next_turn_limit": 30,
      "battle_summary": {
        "p1_death_reason": "(일반 전투 사망 사유, 없으면 null)",
        "p2_death_reason": "(일반 전투 사망 사유, 없으면 null)",
        "special_win_reason": "(특수 승리 발생 사유, 없거나 전투사망 사유가 존재하면 null)",
        "peaceful_draw_reason": "(아무도 죽지 않고 무승부/휴전으로 끝날 때 사유, 계속 진행 시 null)",
        "p1_legacy": "(생존 시 서사 요약)",

    [주의사항]
    1. 위 구조를 어기면 마인크래프트 게임 엔진이 강제로 종료됩니다. 반드시 정해진 키(narrative, p1_result 등)를 사용하세요.
    2. 절대로 Player1, Player2와 같은 객체로 묶지 말고, 평면적인 JSON 구조를 유지하세요.
    3. 신의 권능급의 아이템 사용이 아니라면 반드시 현재 모드 규칙을 우선으로 판정하세요
    

